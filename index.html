<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>快乐小鸡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
#game{width:100%;height:100%;position:relative;overflow:hidden;font-family:'Comic Sans MS','Chalkboard SE',cursive,sans-serif}

/* ===== CSS Custom Properties for pen position ===== */
:root{--pen-left:2%;--pen-right:2%;--pen-top:43%;--pen-bottom:0%}

/* ===== Sky ===== */
.sky{position:absolute;top:0;left:0;right:0;height:45%;z-index:0;
  background:linear-gradient(180deg,#4A90D9 0%,#6DB3F2 25%,#87CEEB 45%,#A8D8EA 65%,#C8E6C9 85%,#A5D6A7 100%)}

/* ===== Hills ===== */
.hills{position:absolute;top:0;left:0;right:0;height:55%;z-index:0;pointer-events:none}

/* ===== Ground ===== */
.ground{position:absolute;top:43%;left:0;right:0;bottom:0;z-index:1;
  background:linear-gradient(180deg,#7CB342 0%,#689F38 8%,#558B2F 20%,#4A7C28 40%,#3E6B22 70%,#33601A 100%);
  box-shadow:inset 0 -20px 40px rgba(0,0,0,.08)}
.ground::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 20%,rgba(139,195,74,.35) 0%,transparent 50%),
  radial-gradient(ellipse at 30% 60%,rgba(104,159,56,.2) 0%,transparent 40%),
  radial-gradient(ellipse at 75% 40%,rgba(129,199,132,.25) 0%,transparent 35%)}

/* ===== WeChat Audio Unlock Overlay ===== */
#audio-unlock{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
#audio-unlock .unlock-box{text-align:center;color:#fff;padding:40px 50px;border-radius:24px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);animation:unlockBounce .6s ease-out}
#audio-unlock .unlock-box h2{font-size:28px;font-weight:700;margin-bottom:12px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
#audio-unlock .unlock-box p{font-size:16px;opacity:.85;margin-bottom:24px}
#audio-unlock .unlock-btn{display:inline-block;padding:14px 48px;border:none;border-radius:50px;font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#FF9800,#F57C00);box-shadow:0 4px 20px rgba(255,152,0,.45);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s}
#audio-unlock .unlock-btn:active{transform:scale(.95)}
@keyframes unlockBounce{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}

/* ===== Foreground depth ===== */
.fg-depth{position:absolute;bottom:0;left:0;right:0;height:18%;z-index:3;pointer-events:none;
  background:linear-gradient(to top,rgba(46,96,26,.35) 0%,transparent 100%)}

/* ===== Sun ===== */
.sun{position:absolute;top:15px;right:6%;width:75px;height:75px;z-index:2}
.sun-core{width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#FFF9C4,#FFE082 40%,#FFD54F 70%,#FFC107);
  box-shadow:0 0 40px 12px rgba(255,215,0,.4),0 0 80px 30px rgba(255,193,7,.18);
  animation:sunPulse 4s ease-in-out infinite}
@keyframes sunPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.sun-rays{position:absolute;inset:-22px;animation:sunSpin 25s linear infinite}
@keyframes sunSpin{to{transform:rotate(360deg)}}

/* ===== Clouds ===== */
.cloud{position:absolute;z-index:1;pointer-events:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.05))}
.cloud-1{top:35px;left:-140px;animation:drift 26s linear infinite}
.cloud-2{top:80px;left:-170px;animation:drift 36s linear infinite 7s;opacity:.85}
.cloud-3{top:20px;left:-110px;animation:drift 30s linear infinite 13s;opacity:.7}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 220px))}}

/* ===== Title ===== */
.title-banner{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:50;
  background:linear-gradient(135deg,#FF7675,#FDCB6E);color:#fff;
  padding:9px 34px;border-radius:28px;font-size:28px;font-weight:bold;letter-spacing:5px;white-space:nowrap;
  text-shadow:1px 2px 0 rgba(0,0,0,.12);
  box-shadow:0 4px 18px rgba(255,107,107,.35),inset 0 2px 0 rgba(255,255,255,.25),inset 0 -3px 0 rgba(0,0,0,.1);
  animation:titleFloat 3s ease-in-out infinite;cursor:default}
@keyframes titleFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}

/* ===== NuoNuo Banner ===== */
.nuonuo-banner{position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:50;
  background:linear-gradient(135deg,#CE93D8,#F48FB1);color:#fff;
  padding:6px 24px;border-radius:18px;font-size:16px;font-weight:bold;letter-spacing:2px;white-space:nowrap;
  text-shadow:1px 1px 0 rgba(0,0,0,.1);
  box-shadow:0 3px 12px rgba(206,147,216,.4),inset 0 1px 0 rgba(255,255,255,.3);
  animation:nuonuoFloat 4s ease-in-out infinite;cursor:pointer;transition:transform .2s}
.nuonuo-banner:hover{transform:translateX(-50%) scale(1.08);box-shadow:0 5px 20px rgba(206,147,216,.6)}
.nuonuo-banner:active{transform:translateX(-50%) scale(.95)}
@keyframes nuonuoFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-3px)}}

/* ===== Barn ===== */
.barn{position:absolute;left:3%;bottom:52%;z-index:3;width:clamp(100px,14vw,190px)}
.barn-shadow{position:absolute;bottom:-8px;left:5%;width:90%;height:12px;
  border-radius:50%;background:radial-gradient(ellipse,rgba(0,0,0,.15) 0%,transparent 60%)}

/* ===== Pen Ground ===== */
.pen-ground{position:absolute;z-index:4;
  left:var(--pen-left);right:var(--pen-right);top:var(--pen-top);bottom:var(--pen-bottom);
  background:radial-gradient(ellipse at 50% 40%,#7CB342 0%,#689F38 40%,#558B2F 80%);
  border-radius:4px;box-shadow:inset 0 2px 20px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.06)}
.pen-ground::before{content:'';position:absolute;inset:0;border-radius:4px;
  background:radial-gradient(circle at 25% 75%,rgba(139,195,74,.4) 0%,transparent 12%),
  radial-gradient(circle at 70% 25%,rgba(124,179,66,.35) 0%,transparent 10%),
  radial-gradient(circle at 50% 50%,rgba(104,159,56,.2) 0%,transparent 15%)}

/* ===== Fence Rails ===== */
.fence-rail{position:absolute;z-index:16;pointer-events:none;border-radius:3px}
.fence-rail-h{height:10px;left:var(--pen-left);right:var(--pen-right);
  background:linear-gradient(to bottom,#D4AD6A,#C09A55,#A8843E);
  box-shadow:0 2px 4px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.2)}
.fence-rail-v{width:10px;top:var(--pen-top);bottom:var(--pen-bottom);
  background:linear-gradient(to right,#8B6914,#B8925A,#C9A96E,#B8925A,#8B6914);
  box-shadow:2px 0 4px rgba(0,0,0,.12),inset 1px 0 0 rgba(255,255,255,.1)}
.fence-rail-left{left:var(--pen-left)}
.fence-rail-right{right:var(--pen-right)}
.fence-rail-top{top:calc(var(--pen-top) - 3px)}
.fence-rail-mid1{top:calc(var(--pen-top) + (100vh - 100vh * var(--pen-top) - 0px) * 0.33)}
.fence-rail-mid2{top:calc(var(--pen-top) + (100vh - 100vh * var(--pen-top) - 0px) * 0.66)}
.fence-rail-bottom{bottom:calc(var(--pen-bottom) - 3px)}

/* ===== Fence Posts ===== */
.fence-post{position:absolute;z-index:17;pointer-events:none;
  width:14px;border-radius:3px 3px 2px 2px;
  background:linear-gradient(to right,#7A5A10,#B08A45,#C9A96E,#B08A45,#7A5A10);
  box-shadow:2px 2px 4px rgba(0,0,0,.15),inset 1px 0 0 rgba(255,255,255,.12)}
.fence-post::before{content:'';position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;
  border-bottom:14px solid #C9A96E}
.fence-post::after{content:'';position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;
  border-bottom:11px solid #D4B87A;opacity:.5}

/* ===== Fence Gate ===== */
.fence-gate{position:absolute;z-index:18;pointer-events:none}
.fence-gate-post{position:absolute;z-index:18;pointer-events:none;width:16px;border-radius:3px 3px 2px 2px;
  background:linear-gradient(to right,#5C3D0A,#8B6914,#A0802A,#8B6914,#5C3D0A);
  box-shadow:3px 2px 6px rgba(0,0,0,.25),inset 1px 0 0 rgba(255,255,255,.1)}
.fence-gate-post::before{content:'';position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;
  border-bottom:16px solid #A0802A}

/* ===== Side-view Chick ===== */
.chicken{position:absolute;z-index:10;cursor:pointer;-webkit-tap-highlight-color:transparent;
  will-change:left,top,transform}
.chicken:hover{filter:brightness(1.1) drop-shadow(0 0 8px rgba(255,255,100,.4))}
.chicken svg{display:block;width:100%;height:100%}
.chicken-shadow{position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);
  border-radius:50%;pointer-events:none;background:radial-gradient(ellipse,rgba(0,0,0,.18) 0%,transparent 70%)}

/* Rooster & Hen keep original sizes & animations */
.chicken.rooster{width:125px;height:148px}
.chicken.hen{width:105px;height:112px}
.chicken.rooster .chicken-shadow{width:75px;height:14px}
.chicken.hen .chicken-shadow{width:60px;height:11px}
.chicken .body-group{transform-origin:center bottom}
.chicken.rooster.walking .body-group,.chicken.hen.walking .body-group{animation:walkBob .3s ease-in-out infinite}
@keyframes walkBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.chicken.rooster.idle .body-group,.chicken.hen.idle .body-group{animation:idleBob 3s ease-in-out infinite}
@keyframes idleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.chicken.rooster.pecking .body-group,.chicken.hen.pecking .body-group{animation:peck .55s ease-in-out infinite}
@keyframes peck{0%,100%{transform:translateY(0) rotate(0)}40%{transform:translateY(6px) rotate(18deg)}}
.chicken.active .body-group{animation:none!important}
.chicken.rooster.active .body-group{animation:roosterCrow .9s ease-out forwards!important}
.chicken.hen.active .body-group{animation:henLay 1.3s ease-out forwards!important}
@keyframes roosterCrow{0%{transform:translateY(0) scaleY(1)}20%{transform:translateY(-10px) scaleY(1.15)}50%{transform:translateY(-18px) scaleY(1.22)}80%{transform:translateY(-6px) scaleY(1.06)}100%{transform:translateY(0) scaleY(1)}}
@keyframes henLay{0%{transform:translateY(0) scaleY(1)}30%{transform:translateY(3px) scaleY(.82) scaleX(1.12)}60%{transform:translateY(3px) scaleY(.82) scaleX(1.12)}100%{transform:translateY(0) scaleY(1) scaleX(1)}}
.chicken.clicked{filter:brightness(1.3) drop-shadow(0 0 12px rgba(255,255,0,.6))}
.chicken.clicked .body-group{animation:pulse .3s ease-out!important}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}

/* ===== Side-view Chick (new) ===== */
.chicken.chick{width:54px;height:46px}
.chicken.chick .chicken-shadow{width:30px;height:6px}
/* Leg walk animation for side-view chick */
.chick-leg-front{transform-origin:8px 0px;animation:none}
.chick-leg-back{transform-origin:8px 0px;animation:none}
.chicken.rooster.walking .rooster-leg-front{transform-origin:52px 116px;animation:legFront .32s ease-in-out infinite}
.chicken.rooster.walking .rooster-leg-back{transform-origin:78px 116px;animation:legBack .32s ease-in-out infinite}
.chicken.hen.walking .hen-leg-front{transform-origin:42px 91px;animation:legFront .3s ease-in-out infinite}
.chicken.hen.walking .hen-leg-back{transform-origin:70px 91px;animation:legBack .3s ease-in-out infinite}
.chicken.chick.walking .chick-leg-front{animation:legFront .28s ease-in-out infinite}
.chicken.chick.walking .chick-leg-back{animation:legBack .28s ease-in-out infinite}
.chicken.chick.running .chick-leg-front{animation:legFront .14s ease-in-out infinite}
.chicken.chick.running .chick-leg-back{animation:legBack .14s ease-in-out infinite}
@keyframes legFront{0%,100%{transform:rotate(-22deg)}50%{transform:rotate(22deg)}}
@keyframes legBack{0%,100%{transform:rotate(22deg)}50%{transform:rotate(-22deg)}}
/* Wing flutter when fleeing */
.chick-wing{transform-origin:center center}
.chicken.chick.running .chick-wing{animation:wingFlutter .12s ease-in-out infinite}
@keyframes wingFlutter{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(12deg)}}
/* Idle bob for chick */
.chicken.chick.idle .chick-body{animation:chickIdleBob 2.5s ease-in-out infinite}
@keyframes chickIdleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.chicken.chick.pecking .chick-body{animation:chickPeck .5s ease-in-out infinite}
@keyframes chickPeck{0%,100%{transform:translateY(0) rotate(0)}45%{transform:translateY(4px) rotate(20deg)}}
.chicken.chick.active .chick-body{animation:chickJump .65s ease-out forwards}
@keyframes chickJump{0%{transform:translateY(0)}30%{transform:translateY(-16px) scale(1.1)}60%{transform:translateY(-10px)}100%{transform:translateY(0) scale(1)}}

/* ===== Sparkles ===== */
.sparkle{position:absolute;z-index:55;pointer-events:none;width:7px;height:7px;border-radius:50%;opacity:0}
.sparkle.burst{animation:sparkleBurst .9s ease-out forwards}
@keyframes sparkleBurst{0%{opacity:1;transform:scale(0) translate(0,0)}50%{opacity:1;transform:scale(1.8)}100%{opacity:0;transform:scale(.4) translate(var(--tx),var(--ty))}}

/* ===== Particles ===== */
.particle{position:absolute;z-index:55;pointer-events:none;font-size:18px;opacity:0}
.particle.float-up{animation:floatUp 1.6s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-90px) scale(.4)}}

/* ===== Egg ===== */
.egg{position:absolute;z-index:12;pointer-events:auto;cursor:pointer;
  width:28px;height:36px;
  background:radial-gradient(ellipse at 38% 30%,#FFFDE7,#FFF9C4 45%,#F0E8C8);
  border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
  box-shadow:0 3px 8px rgba(0,0,0,.2),inset 0 -4px 8px rgba(0,0,0,.06),inset 0 2px 4px rgba(255,255,255,.5);
  opacity:0;transform:scale(0);transition:all .45s cubic-bezier(.34,1.56,.64,1)}
.egg.show{opacity:1;transform:scale(1);animation:eggWobble 2s ease-in-out infinite .5s}
@keyframes eggWobble{0%,100%{transform:scale(1) rotate(0)}25%{transform:scale(1) rotate(-3deg)}75%{transform:scale(1) rotate(3deg)}}
.egg.cracking{animation:eggCrack .6s ease-in forwards!important;pointer-events:none}
@keyframes eggCrack{
  0%{transform:scale(1) rotate(0);opacity:1}
  20%{transform:scale(1.1) rotate(-5deg)}
  40%{transform:scale(1.1) rotate(5deg)}
  60%{transform:scale(1.15) rotate(-8deg);opacity:1}
  100%{transform:scale(0) rotate(15deg);opacity:0}
}

/* ===== Hatching ===== */
.chicken.hatching{animation:hatchPop .6s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes hatchPop{0%{transform:scale(0) translateY(10px);opacity:0}60%{transform:scale(1.2) translateY(-5px);opacity:1}100%{transform:scale(1) translateY(0);opacity:1}}

/* ===== Decorations ===== */
.flower{position:absolute;z-index:6;pointer-events:none;animation:flowerSway 3.5s ease-in-out infinite}
@keyframes flowerSway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
.butterfly{position:absolute;z-index:7;pointer-events:none;animation:butterflyFly 9s ease-in-out infinite}
@keyframes butterflyFly{0%{transform:translate(0,0) rotate(0)}25%{transform:translate(35px,-25px) rotate(6deg)}50%{transform:translate(-15px,-40px) rotate(-4deg)}75%{transform:translate(-35px,-12px) rotate(5deg)}100%{transform:translate(0,0) rotate(0)}}
.butterfly .wing{animation:wingFlap .28s ease-in-out infinite alternate}
@keyframes wingFlap{0%{transform:scaleX(1)}100%{transform:scaleX(.25)}}
.grass-detail{position:absolute;z-index:7;pointer-events:none}
.hay-bale{position:absolute;z-index:5;pointer-events:none}

/* ===== Hint ===== */
.hint{position:absolute;bottom:3%;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.8);font-size:13px;text-shadow:1px 1px 3px rgba(0,0,0,.3);
  z-index:50;animation:hintPulse 2.5s ease-in-out infinite}
@keyframes hintPulse{0%,100%{opacity:.5}50%{opacity:1}}

@media(max-width:600px){
  .title-banner{font-size:22px;padding:7px 20px;letter-spacing:3px}
  .nuonuo-banner{font-size:13px;padding:4px 16px;top:52px}
  .chicken.rooster{width:100px;height:120px}.chicken.hen{width:85px;height:90px}.chicken.chick{width:44px;height:38px}
  .chicken.rooster .chicken-shadow{width:60px;height:11px}.chicken.hen .chicken-shadow{width:48px;height:9px}.chicken.chick .chicken-shadow{width:24px;height:5px}
  .sun{width:55px;height:55px}.fence-rail-h{height:8px}.fence-rail-v{width:8px}.fence-post{width:11px}
  .fence-post::before{border-left-width:7px;border-right-width:7px;border-bottom-width:11px;top:-10px}
  .fence-post::after{border-left-width:4px;border-right-width:4px;border-bottom-width:8px;top:-10px}
}

/* ===== Seesaw ===== */
#seesaw-container{position:absolute;z-index:30;pointer-events:none}
#seesaw-plank{transform-origin:center center;transition:transform 0.4s ease-in-out}
.seesaw-end{cursor:pointer;pointer-events:all}
.seesaw-end-hint{animation:seesawPulse 1.5s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes seesawPulse{0%,100%{opacity:0.3;transform:scale(0.85)}50%{opacity:0.75;transform:scale(1.2)}}
.seesaw-selected{filter:drop-shadow(0 0 8px #FFD700) drop-shadow(0 0 4px #FF9800)}
/* ===== Seesaw selection hint text ===== */
.seesaw-hint-arrow{position:absolute;z-index:32;pointer-events:none;color:#fff;font-size:18px;font-weight:700;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,.55);white-space:nowrap;opacity:0;transform:translate(-50%,-50%);transition:opacity .25s}
.seesaw-hint-arrow.show{opacity:1;animation:seesawHintFloat 1.2s ease-in-out infinite}
@keyframes seesawHintFloat{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-10px)}}
.seesaw-hint-label{position:absolute;z-index:31;pointer-events:none;color:#FFE082;font-size:13px;font-weight:600;text-align:center;text-shadow:0 2px 6px rgba(0,0,0,.55);white-space:nowrap;opacity:0;transform:translate(-50%,0);transition:opacity .25s}
.seesaw-hint-label.show{opacity:0.9}
</style>
</head>
<body>
<!-- WeChat Audio Unlock Overlay -->
<div id="audio-unlock">
  <div class="unlock-box">
    <h2>快乐小鸡</h2>
    <p>诺诺创意作品</p>
    <button class="unlock-btn" id="unlock-btn">进入农场</button>
  </div>
</div>

<div id="game">

<!-- Sky -->
<div class="sky"></div>

<!-- Hills -->
<div class="hills">
  <svg width="100%" height="100%" viewBox="0 0 1200 500" preserveAspectRatio="none">
    <path d="M0,380 Q150,280 300,340 Q450,260 600,320 Q750,240 900,300 Q1050,260 1200,310 L1200,500 L0,500Z" fill="#8FBC8F" opacity=".45"/>
    <path d="M0,400 Q200,310 400,370 Q550,290 700,350 Q850,280 1000,340 Q1100,310 1200,350 L1200,500 L0,500Z" fill="#6B9E5A" opacity=".5"/>
    <path d="M0,430 Q180,360 360,410 Q500,350 650,400 Q800,340 950,390 Q1080,360 1200,400 L1200,500 L0,500Z" fill="#558B2F" opacity=".4"/>
  </svg>
</div>

<!-- Ground -->
<div class="ground"></div>

<!-- Foreground depth -->
<div class="fg-depth"></div>

<!-- Sun -->
<div class="sun">
  <div class="sun-core"></div>
  <div class="sun-rays">
    <svg viewBox="0 0 120 120" fill="none"><g opacity=".22">
      <line x1="60" y1="0" x2="60" y2="18" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
      <line x1="60" y1="102" x2="60" y2="120" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="60" x2="18" y2="60" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
      <line x1="102" y1="60" x2="120" y2="60" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="18" x2="31" y2="31" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="89" y1="89" x2="102" y2="102" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="102" y1="18" x2="89" y2="31" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="18" y1="102" x2="31" y2="89" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
    </g></svg>
  </div>

<script>
// ===== CONFIG =====
const PEN = { leftPct: 0.01, rightPct: 0.99, topPct: 0.40, bottomPct: 0.99 };
const MAX_CHICKS = 15;
// Gate: positioned at center-bottom of fence, width ~60px
const GATE_WIDTH = 60;
let audioCtx = null;
let gateCenterX = 0; // updated in init
let gateY = 0;       // bottom fence y position

// ===== Seesaw State =====
let seesawEl = null;           // container div
let seesawPlankEl = null;      // the plank SVG group
let seesawAngle = 0;           // current tilt angle in degrees
let seesawTargetAngle = 0;     // target tilt angle
let seesawOscDir = 1;          // oscillation direction when balanced
let seesawSelectedEnd = null;  // 'left' | 'right' | null
// chickens on seesaw: {left: [chickenData...], right: [chickenData...]}
const seesawChickens = { left: [], right: [] };
const SEESAW_MAX_PER_SIDE = 3;
const SEESAW_TILT_MAX = 22;    // degrees max tilt

function getSeesawWeight(side) {
  let w = 0;
  seesawChickens[side].forEach(d => {
    if (d.type === 'hen') w += 3;
    else if (d.type === 'rooster') w += 99; // special: rooster triggers eject
    else w += 1; // chick
  });
  return w;
}

function hasRoosterOnSeesaw() {
  return seesawChickens.left.some(d => d.type === 'rooster') ||
         seesawChickens.right.some(d => d.type === 'rooster');
}

function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') { audioCtx.resume(); }
  return audioCtx;
}

function getPenBounds() {
  const g = document.getElementById('game');
  return {
    left: g.offsetWidth * PEN.leftPct,
    right: g.offsetWidth * PEN.rightPct,
    top: g.offsetHeight * PEN.topPct,
    bottom: g.offsetHeight * PEN.bottomPct
  };
}

// ===== Generate Fence Posts (with gate gap) =====
function generateFencePosts() {
  document.querySelectorAll('.fence-post,.fence-gate,.fence-gate-post').forEach(p => p.remove());
  const game = document.getElementById('game');
  const gw = game.offsetWidth, gh = game.offsetHeight;
  const topY = gh * PEN.topPct;
  const botY = gh * PEN.bottomPct;
  const leftX = gw * PEN.leftPct;
  const rightX = gw * PEN.rightPct;
  const fenceH = botY - topY;
  const postH = Math.min(fenceH * 0.08, 60);

  // Gate is at center of bottom rail
  gateCenterX = (leftX + rightX) / 2;
  gateY = botY;
  const gateL = gateCenterX - GATE_WIDTH / 2;
  const gateR = gateCenterX + GATE_WIDTH / 2;

  // Posts along top rail
  const hCount = Math.max(8, Math.floor(gw / 80));
  for (let i = 0; i <= hCount; i++) {
    const x = leftX + (rightX - leftX) * (i / hCount) - 7;
    createPost(game, x, topY - 10, postH);
  }
  // Posts along bottom rail — skip gate area
  for (let i = 0; i <= hCount; i++) {
    const x = leftX + (rightX - leftX) * (i / hCount) - 7;
    if (x + 14 < gateL || x > gateR) {
      createPost(game, x, botY - 4, postH);
    }
  }
  // Posts along left and right rails
  const vCount = Math.max(3, Math.floor(fenceH / 120));
  for (let i = 1; i < vCount; i++) {
    const y = topY + fenceH * (i / vCount) - 10;
    createPost(game, leftX - 2, y, postH * 0.9);
    createPost(game, rightX - 5, y, postH * 0.9);
  }

  // Draw gate: two taller posts + open gate panel (angled open)
  const gatePostH = Math.min(postH * 1.5, 80);
  // Left gate post
  const lpEl = document.createElement('div');
  lpEl.className = 'fence-gate-post';
  lpEl.style.left = (gateL - 8) + 'px';
  lpEl.style.top = (botY - 6) + 'px';
  lpEl.style.height = gatePostH + 'px';
  game.appendChild(lpEl);
  // Right gate post
  const rpEl = document.createElement('div');
  rpEl.className = 'fence-gate-post';
  rpEl.style.left = (gateR - 8) + 'px';
  rpEl.style.top = (botY - 6) + 'px';
  rpEl.style.height = gatePostH + 'px';
  game.appendChild(rpEl);

  // Gate panel: SVG drawn as an open (angled) wooden gate, hinged at left post
  const gateEl = document.createElement('div');
  gateEl.className = 'fence-gate';
  gateEl.style.left = (gateL - 8) + 'px';
  gateEl.style.top = (botY - gatePostH - 4) + 'px';
  gateEl.style.width = (GATE_WIDTH + 20) + 'px';
  gateEl.style.height = gatePostH + 'px';
  // SVG of open gate (rotated 50deg from hinge at top-left)
  gateEl.innerHTML = `<svg width="${GATE_WIDTH+20}" height="${gatePostH}" viewBox="0 0 ${GATE_WIDTH+20} ${gatePostH}">
    <g transform="rotate(-50, 8, ${gatePostH})">
      <rect x="4" y="0" width="${GATE_WIDTH-4}" height="${gatePostH-2}" rx="2" fill="#9C6B2A" stroke="#7A5010" stroke-width="1.5" opacity=".85"/>
      <line x1="4" y1="${gatePostH*0.33}" x2="${GATE_WIDTH-4}" y2="${gatePostH*0.33}" stroke="#7A5010" stroke-width="1.5" opacity=".6"/>
      <line x1="4" y1="${gatePostH*0.66}" x2="${GATE_WIDTH-4}" y2="${gatePostH*0.66}" stroke="#7A5010" stroke-width="1.5" opacity=".6"/>
      <line x1="${GATE_WIDTH*0.45}" y1="2" x2="8" y2="${gatePostH-4}" stroke="#7A5010" stroke-width="1.5" opacity=".5"/>
    </g>
  </svg>`;
  game.appendChild(gateEl);

  // Update bottom fence rail to leave gate gap
  updateBottomRailWithGate(leftX, rightX, botY, gateL, gateR, game);
}

function updateBottomRailWithGate(leftX, rightX, botY, gateL, gateR, game) {
  // Remove existing bottom rail
  document.querySelectorAll('.fence-rail-bottom').forEach(r => r.remove());
  // Left section
  const rl = document.createElement('div');
  rl.className = 'fence-rail fence-rail-h';
  rl.style.left = leftX + 'px';
  rl.style.width = (gateL - leftX) + 'px';
  rl.style.bottom = 'calc(var(--pen-bottom) - 3px)';
  rl.style.right = 'auto';
  document.getElementById('game').appendChild(rl);
  // Right section
  const rr = document.createElement('div');
  rr.className = 'fence-rail fence-rail-h';
  rr.style.left = gateR + 'px';
  rr.style.width = (rightX - gateR) + 'px';
  rr.style.bottom = 'calc(var(--pen-bottom) - 3px)';
  rr.style.right = 'auto';
  document.getElementById('game').appendChild(rr);
}

function createPost(parent, x, y, h) {
  const p = document.createElement('div');
  p.className = 'fence-post';
  p.style.left = x + 'px';
  p.style.top = y + 'px';
  p.style.height = h + 'px';
  parent.appendChild(p);
}

  return new Promise(resolve => {
    if (audioBuffers[name]) return resolve(audioBuffers[name]);
    audioBufferWaiters[name].push(resolve);

// ===== NuoNuo Sound =====
let cachedVoices = [];
function loadVoices() {
  if ('speechSynthesis' in window) {
    cachedVoices = speechSynthesis.getVoices();
    if (cachedVoices.length === 0) {
      speechSynthesis.onvoiceschanged = () => {
        cachedVoices = speechSynthesis.getVoices();
      };
    }
  }
}
function playNuoNuoSound() {
  preloadSounds();
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance('诺诺创意作品');
    u.lang = 'zh-CN'; u.rate = 0.72; u.pitch = 1.18; u.volume = 1.0;
    // Try to use a gentle female voice
    const voices = cachedVoices.length > 0 ? cachedVoices : speechSynthesis.getVoices();
    const femaleVoice = voices.find(v => {
      if (!v.lang.startsWith('zh')) return false;
      const n = v.name.toLowerCase();
      return n.includes('ting') || n.includes('婷婷') ||
             n.includes('xiaoxiao') || n.includes('慧') ||
             n.includes('hui') || n.includes('mei-jia') ||
             n.includes('lili') || n.includes('female');
    });
    if (femaleVoice) u.voice = femaleVoice;
    speechSynthesis.speak(u);
  }
  playNuoNuoMelody();
}

function playNuoNuoMelody() {
  const c = getAC(), now = c.currentTime;
  const notes = [
    {f:523, start:0, dur:0.18}, {f:523, start:0.2, dur:0.18},
    {f:587, start:0.4, dur:0.18}, {f:523, start:0.6, dur:0.18},
    {f:698, start:0.8, dur:0.18}, {f:659, start:1.0, dur:0.36},
  ];
  notes.forEach(n => {
    const o = c.createOscillator(), g = c.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(n.f, c.currentTime + n.start);
    g.gain.setValueAtTime(0, c.currentTime + n.start);
    g.gain.linearRampToValueAtTime(0.18, c.currentTime + n.start + 0.03);
    g.gain.setValueAtTime(0.18, c.currentTime + n.start + n.dur * 0.7);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + n.start + n.dur);
    o.connect(g); g.connect(c.destination);
    o.start(c.currentTime + n.start); o.stop(c.currentTime + n.start + n.dur);
    const o2 = c.createOscillator(), g2 = c.createGain();
    o2.type = 'sine'; o2.frequency.setValueAtTime(n.f * 2, c.currentTime + n.start);
    g2.gain.setValueAtTime(0, c.currentTime + n.start);
    g2.gain.linearRampToValueAtTime(0.05, c.currentTime + n.start + 0.03);
    g2.gain.exponentialRampToValueAtTime(0.001, c.currentTime + n.start + n.dur);
    o2.connect(g2); g2.connect(c.destination);
    o2.start(c.currentTime + n.start); o2.stop(c.currentTime + n.start + n.dur);
  });
}

function playChickSound() {
  const c = getAC(), t = c.currentTime;
  // Quick rising sine wave: 2800-3400Hz, 0.1s
  const o = c.createOscillator(), g = c.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(2800, t);
  o.frequency.linearRampToValueAtTime(3400, t + 0.1);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.2, t + 0.015);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.1);
  // Second harmonic for "cheepy" quality
  const o2 = c.createOscillator(), g2 = c.createGain();
  o2.type = 'sine';
  o2.frequency.setValueAtTime(5600, t);
  o2.frequency.linearRampToValueAtTime(6800, t + 0.1);
  g2.gain.setValueAtTime(0, t);
  g2.gain.linearRampToValueAtTime(0.06, t + 0.015);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  o2.connect(g2); g2.connect(c.destination);
  o2.start(t); o2.stop(t + 0.1);
}

function filteredNoise(dur, vol, freqLow, freqHigh, delay, type) {
  const c = getAC(), t = c.currentTime + (delay || 0);
  const bs = Math.floor(c.sampleRate * dur), buf = c.createBuffer(1, bs, c.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < bs; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
  const s = c.createBufferSource(), g = c.createGain();
  s.buffer = buf;
  // Bandpass filter
  const f = c.createBiquadFilter();
  f.type = 'bandpass';
  f.frequency.value = (freqLow + freqHigh) / 2;
  f.Q.value = 1;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(Math.min(vol || 0.1, 1), t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  s.connect(f); f.connect(g); g.connect(c.destination);
  s.start(t); s.stop(t + dur);
}

function playChickChirps(count) {

// ===== Farm ambient sounds =====
let farmWindSource = null;

function startFarmWind() {
  // Continuous low wind / nature ambience
  const c = getAC();
  const bs = c.sampleRate * 8; // 8 second looping buffer
  const buf = c.createBuffer(2, bs, c.sampleRate);
  // Gentle pink-ish noise: filtered white noise
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    let lastOut = 0;
    for (let i = 0; i < bs; i++) {
      const white = (Math.random() * 2 - 1) * 0.3;
      // Simple lowpass for pink-ish quality
      lastOut = 0.7 * lastOut + 0.3 * white;
      d[i] = lastOut;
    }
  }
  farmWindSource = c.createBufferSource();
  farmWindSource.buffer = buf;
  farmWindSource.loop = true;
  // Lowpass filter to make it wind-like
  const lp = c.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 400;
  lp.Q.value = 0.5;
  // Gentle volume
  const g = c.createGain();
  g.gain.value = 0.04;
  farmWindSource.connect(lp);
  lp.connect(g);
  g.connect(c.destination);
  farmWindSource.start();
}

function playRoosterEjectSound() {
  // Boing + chick scatter sounds
  const c = getAC(), t = c.currentTime;
  // Boing: pitch-sweep up
  const o = c.createOscillator(), g = c.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(200, t);
  o.frequency.exponentialRampToValueAtTime(900, t + 0.25);
  o.frequency.exponentialRampToValueAtTime(400, t + 0.5);
  g.gain.setValueAtTime(0.18, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.5);
  // Multiple chick sounds
  for (let i = 0; i < 4; i++) setTimeout(() => playChickSound(), i * 80 + 100);
}

function playFarmAnimalMoo() {
  // Deep cow/pig grunt: low frequency sine sweep + filtered noise
  const c = getAC(), t = c.currentTime;
  // Low "moo" body
  const o = c.createOscillator(), g = c.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(120, t);
  o.frequency.linearRampToValueAtTime(145, t + 0.3);
  o.frequency.linearRampToValueAtTime(110, t + 0.8);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.1, t + 0.08);
  g.gain.setValueAtTime(0.1, t + 0.5);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.9);
  // Triangle harmonic for warmth
  const o2 = c.createOscillator(), g2 = c.createGain();
  o2.type = 'triangle';
  o2.frequency.setValueAtTime(240, t);
  o2.frequency.linearRampToValueAtTime(290, t + 0.3);
  o2.frequency.linearRampToValueAtTime(220, t + 0.8);
  g2.gain.setValueAtTime(0, t);
  g2.gain.linearRampToValueAtTime(0.03, t + 0.08);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
  o2.connect(g2); g2.connect(c.destination);
  o2.start(t); o2.stop(t + 0.9);
  // Vocal noise component
  filteredNoise(0.8, 0.05, 100, 500, 0);
}

// Resume audio after screen lock/unlock or tab switch
document.addEventListener('visibilitychange', function() {
  if (!audioInited || !audioCtx) return;
  if (document.visibilityState === 'visible' && audioCtx.state === 'suspended') {
    audioCtx.resume().then(() => {
      // BGM oscillators and wind buffer are stopped after suspend, restart them
      try {
        playBgMelody();
        startFarmWind();
        startFarmAmbient();
        scheduleFarmAnimals();
      } catch(e) {}
    });
  }
});

function scheduleFarmAnimals() {
  // Play a random farm sound every 15-30 seconds
  const delay = 15000 + Math.random() * 15000;
  setTimeout(() => {
    if (!bgMusicStarted) return;
    const r = Math.random();
    if (r < 0.5) {
      playFarmAnimalMoo(); // cow/pig grunt
    }
    // otherwise just the existing group chick chirps
    scheduleFarmAnimals();
  }, delay);
}

function playBgMelody() {
  if (!bgMusicStarted) return;
  const c = getAC(), now = c.currentTime + 0.05;
  let time = now;
  BGM_MELODY.forEach(n => {
    if (n.f > 0) {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(n.f, time);
      g.gain.setValueAtTime(0, time);
      g.gain.linearRampToValueAtTime(0.12, time + 0.03);
      g.gain.setValueAtTime(0.12, time + n.d * 0.7);
      g.gain.exponentialRampToValueAtTime(0.001, time + n.d);
      o.connect(g); g.connect(bgMusicGain);
      o.start(time); o.stop(time + n.d);
      // Harmonic
      const o2 = c.createOscillator(), g2 = c.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(n.f * 2, time);
      g2.gain.setValueAtTime(0, time);
      g2.gain.linearRampToValueAtTime(0.04, time + 0.03);
      g2.gain.exponentialRampToValueAtTime(0.001, time + n.d);
      o2.connect(g2); g2.connect(bgMusicGain);
      o2.start(time); o2.stop(time + n.d);
    }
    time += n.d + 0.02;
  });
  // Loop: schedule next play
  const totalDur = BGM_MELODY.reduce((sum, n) => sum + n.d + 0.02, 0);
  bgMusicTimer = setTimeout(() => playBgMelody(), totalDur * 1000);
}

function noise(dur, vol, delay) {
  const c = getAC(), t = c.currentTime + (delay || 0);
  const bs = Math.floor(c.sampleRate * dur), buf = c.createBuffer(1, bs, c.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < bs; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
  const s = c.createBufferSource(), g = c.createGain();
  s.buffer = buf;
  g.gain.setValueAtTime(Math.min(vol || 0.1, 1), t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  s.connect(g); g.connect(c.destination);
  s.start(t); s.stop(t + dur);
}

function osc(freq, dur, type, vol, delay) {
  const c = getAC(), t = c.currentTime + (delay || 0);
  const o = c.createOscillator(), g = c.createGain();
  o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(Math.min(vol || 0.3, 1), t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + dur);
  return o;
}

const chickenData = [];

// Minimum distance between chicks to avoid clustering

function initChickens() {
  const bounds = getPenBounds();
  const penW = bounds.right - bounds.left;

  if (penW < 50 || penH < 50) return;

    });
    el.addEventListener('click', e => { e.stopPropagation(); handleChickenClick(el); });
    el.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); handleChickenClick(el); }, {passive:false});

// Check if a position is inside the seesaw no-go zone
function isInSeesawZone(x, y) {
  if (!seesawEl) return false;
  const ssLeft = parseFloat(seesawEl.style.left);
  const ssTop = parseFloat(seesawEl.style.top);
  const plankW = seesawEl._plankW;
  const fulcX = seesawEl._fulcX;
  const fulcY = seesawEl._fulcY;
  // Expand zone generously to keep chickens away from ends
  const zoneCenterX = ssLeft + fulcX;
  const zoneCenterY = ssTop + fulcY;
  const zoneHalfW = plankW / 2 + 50;
  const zoneHalfH = 55;
  return x > zoneCenterX - zoneHalfW && x < zoneCenterX + zoneHalfW &&
         y > zoneCenterY - zoneHalfH && y < zoneCenterY + zoneHalfH;
}

// Pick a new target that avoids clustering with other chicks
function pickNewTarget(d) {
  const b = getPenBounds();
  const pad = 15;
  const availW = b.right - b.left - d.sz.w - pad*2;
  const availH = b.bottom - b.top - d.sz.h - pad*2;
  if (availW < 20 || availH < 20) {
    d.state = 'idle'; d.stateTimer = 1000 + Math.random()*2000; return;
  }

  // Try up to 12 candidate positions, avoid seesaw zone
  let bestX = 0, bestY = 0, bestScore = -1;
  for (let attempt = 0; attempt < 12; attempt++) {
    const tx = b.left + pad + Math.random() * availW;
    const ty = b.top + pad + Math.random() * availH;
    // Skip positions inside seesaw no-go zone
    if (isInSeesawZone(tx, ty)) continue;
    // Score = min distance to other chicks (higher is better)
    let minDist = Infinity;
    chickenData.forEach(other => {
      if (other === d || other.type !== 'chick') return;
      const dx = other.x - tx, dy = other.y - ty;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < minDist) minDist = dist;
    });
    if (minDist === Infinity) minDist = 9999;
    if (minDist > bestScore) { bestScore = minDist; bestX = tx; bestY = ty; }
  }

  d.targetX = bestX;
  d.targetY = bestY;
  d.walkDuration = 2000 + Math.random() * 3000;
  d.stateTimer = d.walkDuration;
  d.state = 'walking';
  d.el.classList.remove('idle','pecking');
  d.el.classList.add('walking');
}

function updateChicken(d, dt) {
  // ===== FLEEING STATE =====
  if (d.state === 'fleeing') {
    const spd = d.speed * dt * 0.13;
    const dx = d.targetX - d.x;
    const dy = d.targetY - d.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 3) {
      d.x += (dx/dist) * spd;
      d.y += (dy/dist) * spd;
      d.facingRight = dx > 0;
    } else {
      // Reached gate vicinity — continue straight out of screen
      d.fleePhase = (d.fleePhase || 0) + 1;
      if (d.fleePhase === 1) {
        // Run straight down/off screen
        const gw = document.getElementById('game').offsetWidth;
        d.targetX = gw / 2 + (Math.random() - 0.5) * 100;
        d.targetY = document.getElementById('game').offsetHeight + 100;
      } else {
        // Off screen — remove
        d.el.style.opacity = '0';
        d.el.style.transition = 'opacity 0.3s';
        setTimeout(() => {
          const idx = chickenData.indexOf(d);
          if (idx >= 0) chickenData.splice(idx, 1);
          d.el.remove();
        }, 350);
        d.state = 'gone';
        return;
      }
    }
    d.el.style.left = d.x + 'px';
    d.el.style.top = d.y + 'px';
    d.el.style.transform = 'scaleX(' + (d.facingRight ? 1 : -1) + ')';
    d.el.style.zIndex = Math.round(d.y);
    return;
  }
  if (d.state === 'gone') return;

  // ===== ON SEESAW STATE =====
  if (d.state === 'on_seesaw') {
    // Position updated every frame by repositionSeesawChickens() in gameLoop
    d.el.style.zIndex = 31;
    return;
  }

  // ===== ACTIVE STATE =====
  if (d.state === 'active') {
    d.activeTimer -= dt;
    if (d.activeTimer <= 0) {
      d.el.classList.remove('active'); d.el.classList.add('idle');
      d.state = 'idle'; d.stateTimer = 1000 + Math.random()*2000;
    }
    d.el.style.left = d.x+'px'; d.el.style.top = d.y+'px';
    d.el.style.transform = 'scaleX('+(d.facingRight?1:-1)+')';
    d.el.style.zIndex = Math.round(d.y);
    return;
  }

  // ===== SEPARATION: push chicks apart if too close =====
  if (d.type === 'chick') {
    chickenData.forEach(other => {
      if (other === d || other.type !== 'chick' || other.state === 'fleeing' || other.state === 'gone') return;
      const dx = d.x - other.x, dy = d.y - other.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 0 && dist < MIN_CHICK_DIST) {
        const push = (MIN_CHICK_DIST - dist) * 0.015;
        d.x += (dx/dist) * push;
        d.y += (dy/dist) * push;
      }
    });
    // Clamp to pen
    const b = getPenBounds();
    d.x = Math.max(b.left + 8, Math.min(d.x, b.right - d.sz.w - 8));
    d.y = Math.max(b.top + 8, Math.min(d.y, b.bottom - d.sz.h - 8));
  }

  d.stateTimer -= dt;
  if (d.state === 'idle') {
    if (d.stateTimer <= 0) {
      const r = Math.random();
      if (r < 0.6) pickNewTarget(d);
      else { d.state='pecking'; d.stateTimer=1500+Math.random()*2000; d.el.classList.remove('idle','walking'); d.el.classList.add('pecking'); }
    }
  } else if (d.state === 'walking') {
    if (d.stateTimer <= 0 || (Math.abs(d.x-d.targetX)<3 && Math.abs(d.y-d.targetY)<3)) {
      d.state='idle'; d.stateTimer=1200+Math.random()*2500;
      d.el.classList.remove('walking'); d.el.classList.add('idle');
    } else {
      const dx=d.targetX-d.x, dy=d.targetY-d.y, dist=Math.sqrt(dx*dx+dy*dy);
      if (dist>1) { const ms=d.speed*dt*0.055; d.x+=(dx/dist)*ms; d.y+=(dy/dist)*ms; d.facingRight=dx>0; }
    }
  } else if (d.state === 'pecking') {
    if (d.stateTimer <= 0) { d.state='idle'; d.stateTimer=1000+Math.random()*2000; d.el.classList.remove('pecking'); d.el.classList.add('idle'); }
  }

  // Push chickens away from seesaw zone
  if (isInSeesawZone(d.x + d.sz.w/2, d.y + d.sz.h/2)) {
    const ssLeft = parseFloat(seesawEl.style.left);
    const ssTop = parseFloat(seesawEl.style.top);
    const fulcX = seesawEl._fulcX;
    const fulcY = seesawEl._fulcY;
    const zoneCX = ssLeft + fulcX;
    const zoneCY = ssTop + fulcY;
    const dx = d.x + d.sz.w/2 - zoneCX;
    const dy = d.y + d.sz.h/2 - zoneCY;
    const pushDist = Math.sqrt(dx*dx + dy*dy) || 1;
    d.x += (dx / pushDist) * 2.5;
    d.y += (dy / pushDist) * 2.5;
    // Also reset target to avoid walking back into zone
    if (d.state === 'walking' && isInSeesawZone(d.targetX, d.targetY)) {
      pickNewTarget(d);
    }
  }

  d.el.style.left = d.x+'px'; d.el.style.top = d.y+'px';
  d.el.style.transform = 'scaleX('+(d.facingRight?1:-1)+')';
  d.el.style.zIndex = Math.round(d.y);
}

let lastTime = 0;
function gameLoop(time) {
  if (lastTime === 0) lastTime = time;
  const dt = Math.min(time - lastTime, 50);
  lastTime = time;

  // Smooth sinusoidal seesaw oscillation when balanced
  if (seesawOscActive && seesawPlankEl) {
    const elapsed = time - seesawOscStart;
    const period = 2200; // 2.2s per full cycle — gentle and natural
    const angle = Math.sin(elapsed / period * Math.PI * 2) * 6;
    seesawPlankEl.style.transform = `rotate(${angle}deg)`;
    seesawTargetAngle = angle;
  }

  chickenData.forEach(d => updateChicken(d, dt));
  repositionSeesawChickens(); // smooth per-frame tracking during oscillation
  requestAnimationFrame(gameLoop);
}

// ===== Flee to gate =====
function startFleeing(d) {
  d.state = 'fleeing';
  d.fleePhase = 0;
  d.speed = 1.0 + Math.random() * 0.4; // faster when fleeing
  d.targetX = gateCenterX;
  d.targetY = gateY - d.sz.h * 0.5;
  d.el.classList.remove('idle','walking','pecking','active');
  d.el.classList.add('running');
  d.el.style.zIndex = 200; // on top while escaping
}

// ===== Click Handler =====
function handleChickenClick(el) {
  const id = el.id || el.dataset.id;
  const type = el.dataset.type;
  const d = chickenData.find(c => c.el === el);

  // If chicken is on seesaw, clicking it removes it (priority over placement)
  if (d && d.state === 'on_seesaw') {
    ['left', 'right'].forEach(s => {
      const idx = seesawChickens[s].indexOf(d);
      if (idx >= 0) seesawChickens[s].splice(idx, 1);
    });
    d.state = 'idle';
    d.stateTimer = 800 + Math.random() * 1200;
    d.el.classList.remove('running');
    d.el.classList.add('idle');
    d.el.style.pointerEvents = 'auto';
    updateSeesawTilt();
    return;
  }

  // If a seesaw end is selected, place this chicken on seesaw
  if (seesawSelectedEnd && d && d.state !== 'fleeing' && d.state !== 'gone') {
    placeChickenOnSeesaw(d, seesawSelectedEnd);
    return;
  }

  // Chick: play sound then flee
  if (type === 'chick') {
    if (animating[id]) return;
    animating[id] = true;
    preloadSounds();
    playChickChirps(2 + Math.floor(Math.random() * 2)); // 2-3 chirps
    // Brief flash
    el.classList.add('clicked');
    setTimeout(() => el.classList.remove('clicked'), 200);
    // Start fleeing after short chirp delay
    setTimeout(() => {
      const d = chickenData.find(c => c.el === el);
      if (d && d.state !== 'fleeing' && d.state !== 'gone') {
        startFleeing(d);
      }
    }, 350);
    return;
  }

  // Rooster & Hen: original behavior
  if (animating[id]) return;
  animating[id] = true;

  if (type === 'rooster') playRoosterSound();
  else if (type === 'hen') playHenSound();

  el.classList.remove('idle','walking','pecking');
  el.classList.add('active','clicked');
  setTimeout(() => el.classList.remove('clicked'), 300);

  if (d) { d.state='active'; d.activeTimer = type==='hen'?1300:900; }

  const r = el.getBoundingClientRect();
  const gr = document.getElementById('game').getBoundingClientRect();
  const cx = r.left - gr.left + r.width/2, cy = r.top - gr.top + r.height*0.3;

  if (type === 'rooster') {
    createParticle(cx-20, cy-10, '♪'); createParticle(cx+10, cy-20, '♫');
    createSparkles(cx, cy, 6, ['#FF6B6B','#FF8E53','#FFD700']);
  } else if (type === 'hen') {
    setTimeout(() => showEgg(el), 1000);
    createParticle(cx, cy-5, '💛');
  }

  const dur = type==='hen'?1300:900;
  setTimeout(() => {
    el.classList.remove('active');
    animating[id] = false;
    const dd = chickenData.find(c => c.el === el);
    if (dd) { dd.state='idle'; dd.stateTimer=800+Math.random()*1500; el.classList.add('idle'); }
  }, dur);
}

function createSeesaw() {
  if (seesawEl) seesawEl.remove();
  const game = document.getElementById('game');
  const b = getPenBounds();
  const gw = game.offsetWidth;
  const gh = game.offsetHeight;

  // Position seesaw in middle of pen
  const cx = (b.left + b.right) / 2;
  const cy = b.top + (b.bottom - b.top) * 0.45;
  const plankW = Math.min((b.right - b.left) * 0.55, 280);
  const plankH = 14;
  const legH = 36;
  const totalW = plankW + 60;
  const totalH = legH + plankH + 20;

  seesawEl = document.createElement('div');
  seesawEl.id = 'seesaw-container';
  seesawEl.style.left = (cx - totalW/2) + 'px';
  seesawEl.style.top = (cy - totalH/2) + 'px';
  seesawEl.style.width = totalW + 'px';
  seesawEl.style.height = totalH + 'px';

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);
  svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
  svg.style.overflow = 'visible';

  // Fulcrum (triangle support)
  const fulcX = totalW / 2;
  const fulcY = totalH - 10;
  const tri = document.createElementNS(svgNS, 'polygon');
  tri.setAttribute('points', `${fulcX},${fulcY - legH} ${fulcX - 16},${fulcY} ${fulcX + 16},${fulcY}`);
  tri.setAttribute('fill', '#8D6E63');
  tri.setAttribute('stroke', '#6D4C41');
  tri.setAttribute('stroke-width', '2');
  svg.appendChild(tri);

  // Base bar
  const base = document.createElementNS(svgNS, 'rect');
  base.setAttribute('x', fulcX - 28);
  base.setAttribute('y', fulcY - 6);
  base.setAttribute('width', '56');
  base.setAttribute('height', '10');
  base.setAttribute('rx', '4');
  base.setAttribute('fill', '#6D4C41');
  svg.appendChild(base);

  // Plank group (rotates around fulcrum)
  const plankGroup = document.createElementNS(svgNS, 'g');
  plankGroup.id = 'seesaw-plank';
  plankGroup.style.transformOrigin = `${fulcX}px ${fulcY - legH}px`;
  plankGroup.style.transition = 'transform 0.5s ease-in-out';

  const plankY = fulcY - legH - plankH / 2;
  const plankX = fulcX - plankW / 2;

  // Plank body
  const plank = document.createElementNS(svgNS, 'rect');
  plank.setAttribute('x', plankX);
  plank.setAttribute('y', plankY);
  plank.setAttribute('width', plankW);
  plank.setAttribute('height', plankH);
  plank.setAttribute('rx', '6');
  plank.setAttribute('fill', '#A0522D');
  plank.setAttribute('stroke', '#7A3B1E');
  plank.setAttribute('stroke-width', '2');
  plankGroup.appendChild(plank);

  // Wood grain lines
  for (let i = 1; i < 5; i++) {
    const grain = document.createElementNS(svgNS, 'line');
    grain.setAttribute('x1', plankX + plankW * i / 5);
    grain.setAttribute('y1', plankY + 2);
    grain.setAttribute('x2', plankX + plankW * i / 5);
    grain.setAttribute('y2', plankY + plankH - 2);
    grain.setAttribute('stroke', '#7A3B1E');
    grain.setAttribute('stroke-width', '1');
    grain.setAttribute('opacity', '0.4');
    plankGroup.appendChild(grain);
  }

  // Left end hint circle (pulsing)
  const leftHint = document.createElementNS(svgNS, 'circle');
  leftHint.setAttribute('cx', plankX + 18);
  leftHint.setAttribute('cy', plankY + plankH / 2);
  leftHint.setAttribute('r', '14');
  leftHint.setAttribute('fill', '#FFD700');
  leftHint.setAttribute('opacity', '0.45');
  leftHint.classList.add('seesaw-end-hint');
  plankGroup.appendChild(leftHint);

  // Right end hint circle
  const rightHint = document.createElementNS(svgNS, 'circle');
  rightHint.setAttribute('cx', plankX + plankW - 18);
  rightHint.setAttribute('cy', plankY + plankH / 2);
  rightHint.setAttribute('r', '14');
  rightHint.setAttribute('fill', '#FFD700');
  rightHint.setAttribute('opacity', '0.45');
  rightHint.classList.add('seesaw-end-hint');
  plankGroup.appendChild(rightHint);

  // Left clickable end zone
  const leftEnd = document.createElementNS(svgNS, 'rect');
  leftEnd.setAttribute('x', plankX);
  leftEnd.setAttribute('y', plankY - 10);
  leftEnd.setAttribute('width', '70');
  leftEnd.setAttribute('height', plankH + 20);
  leftEnd.setAttribute('fill', 'transparent');
  leftEnd.classList.add('seesaw-end');
  leftEnd.dataset = {};
  plankGroup.appendChild(leftEnd);

  // Right clickable end zone
  const rightEnd = document.createElementNS(svgNS, 'rect');
  rightEnd.setAttribute('x', plankX + plankW - 70);
  rightEnd.setAttribute('y', plankY - 10);
  rightEnd.setAttribute('width', '70');
  rightEnd.setAttribute('height', plankH + 20);
  rightEnd.setAttribute('fill', 'transparent');
  rightEnd.classList.add('seesaw-end');
  plankGroup.appendChild(rightEnd);

  svg.appendChild(plankGroup);
  seesawEl.appendChild(svg);
  game.appendChild(seesawEl);
  seesawPlankEl = plankGroup;

  // Store geometry for chicken placement
  seesawEl._plankW = plankW;
  seesawEl._plankX = plankX;
  seesawEl._plankY = plankY;
  seesawEl._plankH = plankH;
  seesawEl._fulcX = fulcX;
  seesawEl._fulcY = fulcY - legH;
  seesawEl._totalW = totalW;
  seesawEl._totalH = totalH;
  seesawEl._cx = cx;
  seesawEl._cy = cy;

  // Event listeners for seesaw ends
  function handleSeesawEnd(endSide, e) {
    e.stopPropagation();
    const arrow = seesawEl._hintArrow;
    const label = seesawEl._hintLabel;

    // If this end already has chickens and nothing is selected → pop one off
    if (!seesawSelectedEnd && seesawChickens[endSide].length > 0) {
      const popped = seesawChickens[endSide].pop();
      popped.state = 'idle';
      popped.stateTimer = 800 + Math.random() * 1200;
      popped.el.classList.remove('running', 'walking', 'pecking');
      popped.el.classList.add('idle');
      popped.el.style.pointerEvents = 'auto';
      // Place chicken near the seesaw end on the ground
      const b = getPenBounds();
      const ssLeft = parseFloat(seesawEl.style.left);
      const ssTop = parseFloat(seesawEl.style.top);
      const fulcX = seesawEl._fulcX;
      const fulcY = seesawEl._fulcY;
      const plankW = seesawEl._plankW;
      const groundY = ssTop + fulcY + 20;
      const groundX = ssLeft + fulcX + (endSide === 'left' ? -plankW/2 : plankW/2);
      popped.x = Math.max(b.left, Math.min(groundX - popped.sz.w/2, b.right - popped.sz.w));
      popped.y = Math.max(b.top, Math.min(groundY, b.bottom - popped.sz.h));
      popped.el.style.left = popped.x + 'px';
      popped.el.style.top = popped.y + 'px';
      popped.el.style.zIndex = Math.round(popped.y);
      updateSeesawTilt();
      createSparkles(popped.x + popped.sz.w/2, popped.y + popped.sz.h/2, 4, ['#FFD700','#FF9800']);
      return;
    }

    if (seesawSelectedEnd === endSide) {
      // Deselect
      seesawSelectedEnd = null;
      leftEnd.classList.remove('seesaw-selected');
      rightEnd.classList.remove('seesaw-selected');
      plankGroup.classList.remove('seesaw-selected');
      arrow.classList.remove('show');
      label.classList.remove('show');
    } else {
      // Check if this end is full (can't add more)
      if (seesawChickens[endSide].length >= SEESAW_MAX_PER_SIDE) {
        const ssLeft = parseFloat(seesawEl.style.left);
        const ssTop = parseFloat(seesawEl.style.top);
        createParticle(ssLeft + fulcX + (endSide === 'left' ? -30 : 30), ssTop + fulcY - 20, '😅');
        return;
      }
      seesawSelectedEnd = endSide;
      if (endSide === 'left') {
        leftEnd.classList.add('seesaw-selected');
        rightEnd.classList.remove('seesaw-selected');
        leftHint.setAttribute('fill', '#FF9800');
        rightHint.setAttribute('fill', '#FFD700');
      } else {
        rightEnd.classList.add('seesaw-selected');
        leftEnd.classList.remove('seesaw-selected');
        rightHint.setAttribute('fill', '#FF9800');
        leftHint.setAttribute('fill', '#FFD700');
      }
      // Position hint above the selected end
      const gameEl = document.getElementById('game');
      const gr = gameEl.getBoundingClientRect();
      const sr = seesawEl.getBoundingClientRect();
      const ssLeft = sr.left - gr.left;
      const ssTop = sr.top - gr.top;
      const fulcX = seesawEl._fulcX;
      const fulcY = seesawEl._fulcY;
      const plankW = seesawEl._plankW;
      const endX = ssLeft + fulcX + (endSide === 'left' ? -plankW/2 + 25 : plankW/2 - 25);
      const endY = ssTop + fulcY - 60;
      arrow.style.left = endX + 'px';
      arrow.style.top = endY + 'px';
      arrow.classList.add('show');
      label.style.left = endX + 'px';
      label.style.top = (endY + 32) + 'px';
      label.classList.add('show');
      // Show particle feedback
      const ex = ssLeft + (endSide === 'left' ? 30 : sr.width - 30);
      const ey = ssTop + sr.height / 2;
      createSparkles(ex, ey, 5, ['#FFD700','#FF9800','#FFF9C4']);
    }
  }

  leftEnd.addEventListener('click', e => handleSeesawEnd('left', e));
  leftEnd.addEventListener('touchstart', e => { e.preventDefault(); handleSeesawEnd('left', e); }, {passive:false});
  rightEnd.addEventListener('click', e => handleSeesawEnd('right', e));
  rightEnd.addEventListener('touchstart', e => { e.preventDefault(); handleSeesawEnd('right', e); }, {passive:false});

  // ===== Seesaw hint text overlays =====
  // Arrow pointing down at selected end
  const hintArrow = document.createElement('div');
  hintArrow.className = 'seesaw-hint-arrow';
  hintArrow.textContent = '👇';
  game.appendChild(hintArrow);
  // Subtitle label
  const hintLabel = document.createElement('div');
  hintLabel.className = 'seesaw-hint-label';
  hintLabel.textContent = '再点小鸡放这里';
  game.appendChild(hintLabel);

  // Store references for update
  seesawEl._hintArrow = hintArrow;
  seesawEl._hintLabel = hintLabel;
  seesawEl._leftEnd = leftEnd;
  seesawEl._rightEnd = rightEnd;
  seesawEl._leftHint = leftHint;
  seesawEl._rightHint = rightHint;
  seesawEl._endHandle = handleSeesawEnd;
  seesawEl._cx = cx;
  seesawEl._cy = cy;
  seesawEl._fulcX = fulcX;
  seesawEl._fulcY = fulcY - legH;
  seesawEl._plankW = plankW;
  seesawEl._plankH = plankH;
}

let seesawOscTimer = null;
let seesawOscActive = false;
let seesawOscStart = 0;

function updateSeesawTilt() {
  if (!seesawPlankEl) return;
  if (seesawOscTimer) { clearInterval(seesawOscTimer); seesawOscTimer = null; }
  seesawOscActive = false;
  // Re-enable CSS transition for smooth settling to target angle
  seesawPlankEl.style.transition = 'transform 0.5s ease-in-out';

  const lw = getSeesawWeight('left');
  const rw = getSeesawWeight('right');
  const total = lw + rw;

  if (total === 0) {
    seesawTargetAngle = 0;
  } else if (lw === rw) {
    // Balanced: start smooth sine oscillation
    seesawOscActive = true;
    seesawOscStart = performance.now();
    // Disable CSS transition so rAF drives the animation directly
    seesawPlankEl.style.transition = 'transform 0s';
    seesawTargetAngle = 0;
    return;
  } else if (lw > rw) {
    const ratio = Math.min((lw - rw) / Math.max(total, 1), 1);
    seesawTargetAngle = -(ratio * SEESAW_TILT_MAX);
  } else {
    const ratio = Math.min((rw - lw) / Math.max(total, 1), 1);
    seesawTargetAngle = ratio * SEESAW_TILT_MAX;
  }
  seesawPlankEl.style.transform = `rotate(${seesawTargetAngle}deg)`;
}

function repositionSeesawChickens() {
  if (!seesawEl) return;
  if (seesawChickens.left.length === 0 && seesawChickens.right.length === 0) return;
  const plankW = seesawEl._plankW;
  const plankX = seesawEl._plankX;
  const plankY = seesawEl._plankY;
  const plankH = seesawEl._plankH;
  const cx = seesawEl._cx;
  const cy = seesawEl._cy;
  const fulcX = seesawEl._fulcX;
  const fulcY = seesawEl._fulcY;
  const angle = seesawTargetAngle * Math.PI / 180;

  // Place chickens on left end
  const ssLeft = parseFloat(seesawEl.style.left);
  const ssTop = parseFloat(seesawEl.style.top);
  seesawChickens.left.forEach((d, i) => {
    const lArmLen = plankW / 2 - 20 - i * 18;
    d.x = ssLeft + fulcX - lArmLen * Math.cos(angle) - d.sz.w / 2;
    d.y = ssTop + fulcY - lArmLen * Math.sin(angle) - d.sz.h;
    d.el.style.left = d.x + 'px';
    d.el.style.top = d.y + 'px';
    d.el.style.zIndex = 31;
  });

  seesawChickens.right.forEach((d, i) => {
    const rArmLen = plankW / 2 - 20 - i * 18;
    d.x = ssLeft + fulcX + rArmLen * Math.cos(angle) - d.sz.w / 2;
    d.y = ssTop + fulcY + rArmLen * Math.sin(angle) - d.sz.h;
    d.el.style.left = d.x + 'px';
    d.el.style.top = d.y + 'px';
    d.el.style.zIndex = 31;
  });
}

function placeChickenOnSeesaw(d, side) {
  // Remove from current seesaw side if already on seesaw
  ['left', 'right'].forEach(s => {
    const idx = seesawChickens[s].indexOf(d);
    if (idx >= 0) seesawChickens[s].splice(idx, 1);
  });

  // Check capacity
  if (seesawChickens[side].length >= SEESAW_MAX_PER_SIDE) {
    createParticle(d.x, d.y - 20, '😅');
    return;
  }

  // Rooster special: eject chicks (not hens) from opposite side
  if (d.type === 'rooster') {
    const oppSide = side === 'left' ? 'right' : 'left';
    // Only eject chicks from opposite side; hens stay put
    const ejected = seesawChickens[oppSide].filter(ed => ed.type === 'chick');
    seesawChickens[oppSide] = seesawChickens[oppSide].filter(ed => ed.type !== 'chick');
    // Add rooster to current side without replacing existing chickens
    seesawChickens[side].push(d);
    d.state = 'on_seesaw';
    updateSeesawTilt();

    // Animate ejected chickens with parabolic arc
    ejected.forEach((ed, i) => {
      setTimeout(() => {
        const gameEl = document.getElementById('game');
        const ssLeft = parseFloat(seesawEl.style.left);
        const ssTop = parseFloat(seesawEl.style.top);
        // Start position: where chicken is on the seesaw
        const startX = ed.x, startY = ed.y;
        // Target: land inside the pen with a high cartoonish arc
        const b = getPenBounds();
        const dirX = oppSide === 'left' ? -1 : 1;
        const endX = oppSide === 'left' ? b.left + 60 : b.right - 120;
        const endY = b.bottom - 40 + Math.random() * 20;
        // Parabolic: big upward launch for cartoon bounce effect
        const vy0 = -(16 + Math.random() * 10); // high upward velocity
        const g = 0.22; // slightly lower gravity for long hang time
        const totalFrames = 55 + Math.floor(Math.random() * 25);
        const vx = (endX - startX) / totalFrames;
        let frame = 0, y = startY, vy = vy0;
        ed.el.style.zIndex = 200;
        ed.el.style.pointerEvents = 'none';
        ed.el.classList.add('running');
        createParticle(startX + ed.sz.w/2, startY, '💨');
        const arcInterval = setInterval(() => {
          frame++;
          y += vy;
          vy += g;
          const x = startX + vx * frame;
          // Exaggerated rotation for cartoon tumbling effect
          const rot = (vy * 5);
          ed.el.style.left = x + 'px';
          ed.el.style.top = y + 'px';
          ed.el.style.transform = `rotate(${Math.max(-120, Math.min(120, rot))}deg) scaleX(${dirX > 0 ? 1 : -1})`;
          if (frame >= totalFrames) {
            clearInterval(arcInterval);
            // Fade out and remove
            ed.el.style.transition = 'opacity 0.3s';
            ed.el.style.opacity = '0';
            ed.state = 'gone';
            setTimeout(() => {
              const idx = chickenData.indexOf(ed);
              if (idx >= 0) chickenData.splice(idx, 1);
              ed.el.remove();
            }, 350);
          }
        }, 16);
      }, i * 180);
    });
    playRoosterEjectSound();
    createSparkles(d.x + d.sz.w/2, d.y, 12, ['#FF4444','#FF8800','#FFDD00']);
    // Rooster walks off the seesaw after ejecting
    const roosterD = d;
    const roosterSide = side;
    setTimeout(() => {
      const idx = seesawChickens[roosterSide].indexOf(roosterD);
      if (idx >= 0) seesawChickens[roosterSide].splice(idx, 1);
      roosterD.state = 'idle';
      roosterD.stateTimer = 1000 + Math.random() * 2000;
      roosterD.el.classList.remove('running', 'walking', 'pecking', 'active');
      roosterD.el.classList.add('idle');
      roosterD.el.style.pointerEvents = 'auto';
      // Position near seesaw on ground
      const b2 = getPenBounds();
      const ssl = parseFloat(seesawEl.style.left);
      const sst = parseFloat(seesawEl.style.top);
      const gx = ssl + seesawEl._fulcX + (roosterSide === 'left' ? -90 : 90);
      const gy = sst + seesawEl._fulcY + 30;
      roosterD.x = Math.max(b2.left, Math.min(gx - roosterD.sz.w/2, b2.right - roosterD.sz.w));
      roosterD.y = Math.max(b2.top, Math.min(gy, b2.bottom - roosterD.sz.h));
      roosterD.el.style.left = roosterD.x + 'px';
      roosterD.el.style.top = roosterD.y + 'px';
      roosterD.el.style.zIndex = Math.round(roosterD.y);
      updateSeesawTilt();
      createSparkles(roosterD.x + roosterD.sz.w/2, roosterD.y, 6, ['#FFD700','#FF9800']);
    }, 1400);
    // Keep selection active after rooster placement for continuous clicks
    if (seesawChickens[side].length >= SEESAW_MAX_PER_SIDE) {
      seesawSelectedEnd = null;
      if (seesawPlankEl) {
        seesawPlankEl.querySelectorAll('.seesaw-end').forEach(e => e.classList.remove('seesaw-selected'));
      }
    }
    return;
  }

  seesawChickens[side].push(d);
  d.state = 'on_seesaw';
  updateSeesawTilt();
  // Keep selection active for continuous clicks; deselect only when side is full
  if (seesawChickens[side].length >= SEESAW_MAX_PER_SIDE) {
    seesawSelectedEnd = null;
    if (seesawEl && seesawEl._hintArrow) { seesawEl._hintArrow.classList.remove('show'); }
    if (seesawEl && seesawEl._hintLabel) { seesawEl._hintLabel.classList.remove('show'); }
    if (seesawPlankEl) {
      seesawPlankEl.querySelectorAll('.seesaw-end').forEach(e => e.classList.remove('seesaw-selected'));
    }
  }

  // Feedback
  createSparkles(d.x + d.sz.w/2, d.y + d.sz.h/2, 6, ['#A5D6A7','#81C784','#FFD700']);
}

// ===== Init =====
function init() {
  loadVoices();
  generateFencePosts();
  initChickens();
  createSeesaw();
  requestAnimationFrame(gameLoop);

  const nb = document.getElementById('nuonuo-banner');
  if (nb) {
    nb.addEventListener('click', e => { e.stopPropagation(); playNuoNuoSound(); });
    nb.addEventListener('touchstart', e => { e.preventDefault(); playNuoNuoSound(); }, {passive:false});
  }

  const tryPreload = () => { preloadSounds(); };
  document.addEventListener('click', tryPreload, { once: true, capture: true });
  document.addEventListener('touchstart', tryPreload, { once: true, capture: true });
}

window.addEventListener('resize', () => {
  generateFencePosts();
  const b = getPenBounds();
  const penW = b.right - b.left;
  const penH = b.bottom - b.top;
  chickenData.forEach(d => {
    if (d.state === 'fleeing' || d.state === 'gone') return;
    const newW = d.el.offsetWidth || d.sz.w;
    const newH = d.el.offsetHeight || d.sz.h;
    d.sz.w = newW; d.sz.h = newH;
    d.x = Math.max(b.left, Math.min(d.x, b.right - d.sz.w));
    d.y = Math.max(b.top, Math.min(d.y, b.bottom - d.sz.h));
    if (d.x <= b.left + 1 && d.y <= b.top + 1 && penW > 50 && penH > 50) {
      d.x = b.left + Math.random() * (penW - d.sz.w);
      d.y = b.top + Math.random() * (penH - d.sz.h);
    }
  });
});

let audioInited = false;
function initAudio() {
  if (!audioInited) { getAC(); audioInited = true; preloadSounds(); startBgMusic(); }
}

// ===== WeChat Audio Unlock - multi-layer approach =====
function forceUnlockAudio() {
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  const ctx = new AC();
  // Play a tiny silent buffer in sync call stack - this is what WeChat requires
  const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start(0);
  // Also resume if suspended
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}

function onUnlock(e) {
  if (audioInited) return;
  // Force unlock AudioContext in sync touch handler
  const ctx = forceUnlockAudio();
  if (ctx) {
    audioCtx = ctx; // reuse this context
    audioInited = true;
    preloadSounds();
    // Delay BGM slightly to ensure buffer decode completes
    setTimeout(startBgMusic, 100);
  }
  // Fade out overlay
  const overlay = document.getElementById('audio-unlock');
  if (overlay) {
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity .4s';
    setTimeout(() => { if (overlay.parentNode) overlay.remove(); }, 400);
  }
}

// Touch (WeChat primary) + Click fallback
const unlockBtn = document.getElementById('unlock-btn');
unlockBtn.addEventListener('touchstart', function(e) { e.preventDefault(); onUnlock(e); }, { once: true, passive: false });
unlockBtn.addEventListener('click', function(e) { onUnlock(e); }, { once: true });

// WeixinJSBridge ready event - additional unlock attempt
function onWxReady() {
  if (typeof WeixinJSBridge !== 'undefined') {
    try {
      WeixinJSBridge.invoke('getNetworkType', {}, function() {
        if (!audioInited) {
          const ctx = forceUnlockAudio();
          if (ctx) { audioCtx = ctx; }
        }
      });
    } catch(e) {}
  }
}
if (document.addEventListener) {
  document.addEventListener('WeixinJSBridgeReady', onWxReady, false);
}

// Random idle chirps (only for in-pen chicks)
function randomChirp() {
  const chicks = chickenData.filter(c => c.type==='chick' && c.state==='idle');
  if (chicks.length > 0 && Math.random() > 0.6) playChickSound();
  setTimeout(randomChirp, 6000 + Math.random() * 9000);
}
setTimeout(randomChirp, 6000);

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => requestAnimationFrame(safeInit));
} else {
  requestAnimationFrame(safeInit);
}

function safeInit() {
  const g = document.getElementById('game');
  if (g.offsetWidth < 50 || g.offsetHeight < 50) {
    requestAnimationFrame(safeInit);
    return;
  }
  init();
}
