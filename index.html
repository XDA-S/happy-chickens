<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>快乐小鸡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
#game{width:100%;height:100%;position:relative;overflow:hidden;font-family:'Comic Sans MS','Chalkboard SE',cursive,sans-serif}

/* ===== CSS Custom Properties for pen position ===== */
:root{--pen-left:2%;--pen-right:2%;--pen-top:43%;--pen-bottom:0%}

/* ===== Sky ===== */
.sky{position:absolute;top:0;left:0;right:0;height:45%;z-index:0;
  background:linear-gradient(180deg,#4A90D9 0%,#6DB3F2 25%,#87CEEB 45%,#A8D8EA 65%,#C8E6C9 85%,#A5D6A7 100%)}

/* ===== Hills ===== */
.hills{position:absolute;top:0;left:0;right:0;height:55%;z-index:0;pointer-events:none}

/* ===== Ground ===== */
.ground{position:absolute;top:43%;left:0;right:0;bottom:0;z-index:1;
  background:linear-gradient(180deg,#7CB342 0%,#689F38 8%,#558B2F 20%,#4A7C28 40%,#3E6B22 70%,#33601A 100%);
  box-shadow:inset 0 -20px 40px rgba(0,0,0,.08)}
.ground::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 20%,rgba(139,195,74,.35) 0%,transparent 50%),
  radial-gradient(ellipse at 30% 60%,rgba(104,159,56,.2) 0%,transparent 40%),
  radial-gradient(ellipse at 75% 40%,rgba(129,199,132,.25) 0%,transparent 35%)}

/* ===== Foreground depth ===== */
.fg-depth{position:absolute;bottom:0;left:0;right:0;height:18%;z-index:3;pointer-events:none;
  background:linear-gradient(to top,rgba(46,96,26,.35) 0%,transparent 100%)}

/* ===== Sun ===== */
.sun{position:absolute;top:15px;right:6%;width:75px;height:75px;z-index:2}
.sun-core{width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#FFF9C4,#FFE082 40%,#FFD54F 70%,#FFC107);
  box-shadow:0 0 40px 12px rgba(255,215,0,.4),0 0 80px 30px rgba(255,193,7,.18);
  animation:sunPulse 4s ease-in-out infinite}
@keyframes sunPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.sun-rays{position:absolute;inset:-22px;animation:sunSpin 25s linear infinite}
@keyframes sunSpin{to{transform:rotate(360deg)}}

/* ===== Clouds ===== */
.cloud{position:absolute;z-index:1;pointer-events:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.05))}
.cloud-1{top:35px;left:-140px;animation:drift 26s linear infinite}
.cloud-2{top:80px;left:-170px;animation:drift 36s linear infinite 7s;opacity:.85}
.cloud-3{top:20px;left:-110px;animation:drift 30s linear infinite 13s;opacity:.7}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 220px))}}

/* ===== Title ===== */
.title-banner{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:50;
  background:linear-gradient(135deg,#FF7675,#FDCB6E);color:#fff;
  padding:9px 34px;border-radius:28px;font-size:28px;font-weight:bold;letter-spacing:5px;white-space:nowrap;
  text-shadow:1px 2px 0 rgba(0,0,0,.12);
  box-shadow:0 4px 18px rgba(255,107,107,.35),inset 0 2px 0 rgba(255,255,255,.25),inset 0 -3px 0 rgba(0,0,0,.1);
  animation:titleFloat 3s ease-in-out infinite;cursor:default}
@keyframes titleFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}

/* ===== NuoNuo Banner ===== */
.nuonuo-banner{position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:50;
  background:linear-gradient(135deg,#CE93D8,#F48FB1);color:#fff;
  padding:6px 24px;border-radius:18px;font-size:16px;font-weight:bold;letter-spacing:2px;white-space:nowrap;
  text-shadow:1px 1px 0 rgba(0,0,0,.1);
  box-shadow:0 3px 12px rgba(206,147,216,.4),inset 0 1px 0 rgba(255,255,255,.3);
  animation:nuonuoFloat 4s ease-in-out infinite;cursor:pointer;transition:transform .2s}
.nuonuo-banner:hover{transform:translateX(-50%) scale(1.08);box-shadow:0 5px 20px rgba(206,147,216,.6)}
.nuonuo-banner:active{transform:translateX(-50%) scale(.95)}
@keyframes nuonuoFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-3px)}}

/* ===== Barn ===== */
.barn{position:absolute;left:3%;bottom:52%;z-index:3;width:clamp(100px,14vw,190px)}
.barn-shadow{position:absolute;bottom:-8px;left:5%;width:90%;height:12px;
  border-radius:50%;background:radial-gradient(ellipse,rgba(0,0,0,.15) 0%,transparent 60%)}

/* ===== Pen Ground ===== */
.pen-ground{position:absolute;z-index:4;
  left:var(--pen-left);right:var(--pen-right);top:var(--pen-top);bottom:var(--pen-bottom);
  background:radial-gradient(ellipse at 50% 40%,#7CB342 0%,#689F38 40%,#558B2F 80%);
  border-radius:4px;box-shadow:inset 0 2px 20px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.06)}
.pen-ground::before{content:'';position:absolute;inset:0;border-radius:4px;
  background:radial-gradient(circle at 25% 75%,rgba(139,195,74,.4) 0%,transparent 12%),
  radial-gradient(circle at 70% 25%,rgba(124,179,66,.35) 0%,transparent 10%),
  radial-gradient(circle at 50% 50%,rgba(104,159,56,.2) 0%,transparent 15%)}

/* ===== Fence Rails ===== */
.fence-rail{position:absolute;z-index:16;pointer-events:none;border-radius:3px}
.fence-rail-h{height:10px;left:var(--pen-left);right:var(--pen-right);
  background:linear-gradient(to bottom,#D4AD6A,#C09A55,#A8843E);
  box-shadow:0 2px 4px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.2)}
.fence-rail-v{width:10px;top:var(--pen-top);bottom:var(--pen-bottom);
  background:linear-gradient(to right,#8B6914,#B8925A,#C9A96E,#B8925A,#8B6914);
  box-shadow:2px 0 4px rgba(0,0,0,.12),inset 1px 0 0 rgba(255,255,255,.1)}
.fence-rail-left{left:var(--pen-left)}
.fence-rail-right{right:var(--pen-right)}
.fence-rail-top{top:calc(var(--pen-top) - 3px)}
.fence-rail-mid1{top:calc(var(--pen-top) + (100vh - 100vh * var(--pen-top) - 0px) * 0.33)}
.fence-rail-mid2{top:calc(var(--pen-top) + (100vh - 100vh * var(--pen-top) - 0px) * 0.66)}
.fence-rail-bottom{bottom:calc(var(--pen-bottom) - 3px)}

/* ===== Fence Posts ===== */
.fence-post{position:absolute;z-index:17;pointer-events:none;
  width:14px;border-radius:3px 3px 2px 2px;
  background:linear-gradient(to right,#7A5A10,#B08A45,#C9A96E,#B08A45,#7A5A10);
  box-shadow:2px 2px 4px rgba(0,0,0,.15),inset 1px 0 0 rgba(255,255,255,.12)}
.fence-post::before{content:'';position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;
  border-bottom:14px solid #C9A96E}
.fence-post::after{content:'';position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;
  border-bottom:11px solid #D4B87A;opacity:.5}

/* ===== Fence Gate ===== */
.fence-gate{position:absolute;z-index:18;pointer-events:none}
.fence-gate-post{position:absolute;z-index:18;pointer-events:none;width:16px;border-radius:3px 3px 2px 2px;
  background:linear-gradient(to right,#5C3D0A,#8B6914,#A0802A,#8B6914,#5C3D0A);
  box-shadow:3px 2px 6px rgba(0,0,0,.25),inset 1px 0 0 rgba(255,255,255,.1)}
.fence-gate-post::before{content:'';position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;
  border-bottom:16px solid #A0802A}

/* ===== Side-view Chick ===== */
.chicken{position:absolute;z-index:10;cursor:pointer;-webkit-tap-highlight-color:transparent;
  will-change:left,top,transform}
.chicken:hover{filter:brightness(1.1) drop-shadow(0 0 8px rgba(255,255,100,.4))}
.chicken svg{display:block;width:100%;height:100%}
.chicken-shadow{position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);
  border-radius:50%;pointer-events:none;background:radial-gradient(ellipse,rgba(0,0,0,.18) 0%,transparent 70%)}

/* Rooster & Hen keep original sizes & animations */
.chicken.rooster{width:125px;height:148px}
.chicken.hen{width:105px;height:112px}
.chicken.rooster .chicken-shadow{width:75px;height:14px}
.chicken.hen .chicken-shadow{width:60px;height:11px}
.chicken .body-group{transform-origin:center bottom}
.chicken.rooster.walking .body-group,.chicken.hen.walking .body-group{animation:walkBob .3s ease-in-out infinite}
@keyframes walkBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.chicken.rooster.idle .body-group,.chicken.hen.idle .body-group{animation:idleBob 3s ease-in-out infinite}
@keyframes idleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.chicken.rooster.pecking .body-group,.chicken.hen.pecking .body-group{animation:peck .55s ease-in-out infinite}
@keyframes peck{0%,100%{transform:translateY(0) rotate(0)}40%{transform:translateY(6px) rotate(18deg)}}
.chicken.active .body-group{animation:none!important}
.chicken.rooster.active .body-group{animation:roosterCrow .9s ease-out forwards!important}
.chicken.hen.active .body-group{animation:henLay 1.3s ease-out forwards!important}
@keyframes roosterCrow{0%{transform:translateY(0) scaleY(1)}20%{transform:translateY(-10px) scaleY(1.15)}50%{transform:translateY(-18px) scaleY(1.22)}80%{transform:translateY(-6px) scaleY(1.06)}100%{transform:translateY(0) scaleY(1)}}
@keyframes henLay{0%{transform:translateY(0) scaleY(1)}30%{transform:translateY(3px) scaleY(.82) scaleX(1.12)}60%{transform:translateY(3px) scaleY(.82) scaleX(1.12)}100%{transform:translateY(0) scaleY(1) scaleX(1)}}
.chicken.clicked{filter:brightness(1.3) drop-shadow(0 0 12px rgba(255,255,0,.6))}
.chicken.clicked .body-group{animation:pulse .3s ease-out!important}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}

/* ===== Side-view Chick (new) ===== */
.chicken.chick{width:54px;height:46px}
.chicken.chick .chicken-shadow{width:30px;height:6px}
/* Leg walk animation for side-view chick */
.chick-leg-front{transform-origin:8px 0px;animation:none}
.chick-leg-back{transform-origin:8px 0px;animation:none}
.chicken.chick.walking .chick-leg-front{animation:legFront .28s ease-in-out infinite}
.chicken.chick.walking .chick-leg-back{animation:legBack .28s ease-in-out infinite}
.chicken.chick.running .chick-leg-front{animation:legFront .14s ease-in-out infinite}
.chicken.chick.running .chick-leg-back{animation:legBack .14s ease-in-out infinite}
@keyframes legFront{0%,100%{transform:rotate(-22deg)}50%{transform:rotate(22deg)}}
@keyframes legBack{0%,100%{transform:rotate(22deg)}50%{transform:rotate(-22deg)}}
/* Wing flutter when fleeing */
.chick-wing{transform-origin:center center}
.chicken.chick.running .chick-wing{animation:wingFlutter .12s ease-in-out infinite}
@keyframes wingFlutter{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(12deg)}}
/* Idle bob for chick */
.chicken.chick.idle .chick-body{animation:chickIdleBob 2.5s ease-in-out infinite}
@keyframes chickIdleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.chicken.chick.pecking .chick-body{animation:chickPeck .5s ease-in-out infinite}
@keyframes chickPeck{0%,100%{transform:translateY(0) rotate(0)}45%{transform:translateY(4px) rotate(20deg)}}
.chicken.chick.active .chick-body{animation:chickJump .65s ease-out forwards}
@keyframes chickJump{0%{transform:translateY(0)}30%{transform:translateY(-16px) scale(1.1)}60%{transform:translateY(-10px)}100%{transform:translateY(0) scale(1)}}

/* ===== Sparkles ===== */
.sparkle{position:absolute;z-index:55;pointer-events:none;width:7px;height:7px;border-radius:50%;opacity:0}
.sparkle.burst{animation:sparkleBurst .9s ease-out forwards}
@keyframes sparkleBurst{0%{opacity:1;transform:scale(0) translate(0,0)}50%{opacity:1;transform:scale(1.8)}100%{opacity:0;transform:scale(.4) translate(var(--tx),var(--ty))}}

/* ===== Particles ===== */
.particle{position:absolute;z-index:55;pointer-events:none;font-size:18px;opacity:0}
.particle.float-up{animation:floatUp 1.6s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-90px) scale(.4)}}

/* ===== Egg ===== */
.egg{position:absolute;z-index:12;pointer-events:auto;cursor:pointer;
  width:28px;height:36px;
  background:radial-gradient(ellipse at 38% 30%,#FFFDE7,#FFF9C4 45%,#F0E8C8);
  border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
  box-shadow:0 3px 8px rgba(0,0,0,.2),inset 0 -4px 8px rgba(0,0,0,.06),inset 0 2px 4px rgba(255,255,255,.5);
  opacity:0;transform:scale(0);transition:all .45s cubic-bezier(.34,1.56,.64,1)}
.egg.show{opacity:1;transform:scale(1);animation:eggWobble 2s ease-in-out infinite .5s}
@keyframes eggWobble{0%,100%{transform:scale(1) rotate(0)}25%{transform:scale(1) rotate(-3deg)}75%{transform:scale(1) rotate(3deg)}}
.egg.cracking{animation:eggCrack .6s ease-in forwards!important;pointer-events:none}
@keyframes eggCrack{
  0%{transform:scale(1) rotate(0);opacity:1}
  20%{transform:scale(1.1) rotate(-5deg)}
  40%{transform:scale(1.1) rotate(5deg)}
  60%{transform:scale(1.15) rotate(-8deg);opacity:1}
  100%{transform:scale(0) rotate(15deg);opacity:0}
}

/* ===== Hatching ===== */
.chicken.hatching{animation:hatchPop .6s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes hatchPop{0%{transform:scale(0) translateY(10px);opacity:0}60%{transform:scale(1.2) translateY(-5px);opacity:1}100%{transform:scale(1) translateY(0);opacity:1}}

/* ===== Decorations ===== */
.flower{position:absolute;z-index:6;pointer-events:none;animation:flowerSway 3.5s ease-in-out infinite}
@keyframes flowerSway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
.butterfly{position:absolute;z-index:7;pointer-events:none;animation:butterflyFly 9s ease-in-out infinite}
@keyframes butterflyFly{0%{transform:translate(0,0) rotate(0)}25%{transform:translate(35px,-25px) rotate(6deg)}50%{transform:translate(-15px,-40px) rotate(-4deg)}75%{transform:translate(-35px,-12px) rotate(5deg)}100%{transform:translate(0,0) rotate(0)}}
.butterfly .wing{animation:wingFlap .28s ease-in-out infinite alternate}
@keyframes wingFlap{0%{transform:scaleX(1)}100%{transform:scaleX(.25)}}
.grass-detail{position:absolute;z-index:7;pointer-events:none}
.hay-bale{position:absolute;z-index:5;pointer-events:none}

/* ===== Hint ===== */
.hint{position:absolute;bottom:3%;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.8);font-size:13px;text-shadow:1px 1px 3px rgba(0,0,0,.3);
  z-index:50;animation:hintPulse 2.5s ease-in-out infinite}
@keyframes hintPulse{0%,100%{opacity:.5}50%{opacity:1}}

@media(max-width:600px){
  .title-banner{font-size:22px;padding:7px 20px;letter-spacing:3px}
  .nuonuo-banner{font-size:13px;padding:4px 16px;top:52px}
  .chicken.rooster{width:100px;height:120px}.chicken.hen{width:85px;height:90px}.chicken.chick{width:44px;height:38px}
  .chicken.rooster .chicken-shadow{width:60px;height:11px}.chicken.hen .chicken-shadow{width:48px;height:9px}.chicken.chick .chicken-shadow{width:24px;height:5px}
  .sun{width:55px;height:55px}.fence-rail-h{height:8px}.fence-rail-v{width:8px}.fence-post{width:11px}
  .fence-post::before{border-left-width:7px;border-right-width:7px;border-bottom-width:11px;top:-10px}
  .fence-post::after{border-left-width:4px;border-right-width:4px;border-bottom-width:8px;top:-10px}
}
</style>
</head>

<div id="game">

<!-- Sky -->
<div class="sky"></div>

<!-- Hills -->
<div class="hills">
  <svg width="100%" height="100%" viewBox="0 0 1200 500" preserveAspectRatio="none">
    <path d="M0,380 Q150,280 300,340 Q450,260 600,320 Q750,240 900,300 Q1050,260 1200,310 L1200,500 L0,500Z" fill="#8FBC8F" opacity=".45"/>

</div>

<!-- Ground -->

<!-- Foreground depth -->
<div class="fg-depth"></div>

<!-- Sun -->
<div class="sun">

  <div class="sun-rays">
    <svg viewBox="0 0 120 120" fill="none"><g opacity=".22">
      <line x1="60" y1="0" x2="60" y2="18" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>

      <line x1="0" y1="60" x2="18" y2="60" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
      <line x1="102" y1="60" x2="120" y2="60" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="18" x2="31" y2="31" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="89" y1="89" x2="102" y2="102" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="102" y1="18" x2="89" y2="31" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="18" y1="102" x2="31" y2="89" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
    </g></svg>
  </div>
</div>

<!-- Clouds -->
<div class="cloud cloud-1"><svg width="110" height="48" viewBox="0 0 110 48"><ellipse cx="55" cy="30" rx="50" ry="16" fill="white"/><ellipse cx="38" cy="20" rx="26" ry="20" fill="white"/><ellipse cx="72" cy="18" rx="24" ry="18" fill="white"/><ellipse cx="52" cy="14" rx="18" ry="14" fill="white"/></svg></div>
<div class="cloud cloud-2"><svg width="140" height="52" viewBox="0 0 140 52"><ellipse cx="70" cy="34" rx="64" ry="17" fill="white"/><ellipse cx="48" cy="22" rx="30" ry="22" fill="white"/><ellipse cx="92" cy="20" rx="28" ry="20" fill="white"/><ellipse cx="68" cy="16" rx="22" ry="16" fill="white"/></svg></div>
<div class="cloud cloud-3"><svg width="90" height="40" viewBox="0 0 90 40"><ellipse cx="45" cy="25" rx="40" ry="12" fill="white"/><ellipse cx="32" cy="17" rx="20" ry="16" fill="white"/><ellipse cx="58" cy="15" rx="18" ry="14" fill="white"/></svg></div>

<!-- Title -->
<div class="title-banner">快乐小鸡</div>

<!-- NuoNuo Banner -->
<div class="nuonuo-banner" id="nuonuo-banner">诺诺创意作品</div>

<!-- Barn -->
<div class="barn">
  <div class="barn-shadow"></div>
  <svg viewBox="0 0 200 170" fill="none">
    <ellipse cx="105" cy="166" rx="80" ry="7" fill="rgba(0,0,0,.08)"/>
    <polygon points="130,55 192,78 192,155 130,155 Z" fill="#7B3F00"/>
    <polygon points="130,55 192,78 192,155 130,155 Z" fill="url(#barnSG)" opacity=".3"/>
    <line x1="161" y1="66" x2="161" y2="155" stroke="#5C2E00" stroke-width=".8" opacity=".4"/>
    <line x1="176" y1="72" x2="176" y2="155" stroke="#5C2E00" stroke-width=".8" opacity=".4"/>
    <rect x="15" y="55" width="115" height="100" fill="#A0522D" rx="1"/>
    <rect x="15" y="55" width="115" height="100" fill="url(#barnG)" opacity=".2"/>
    <line x1="15" y1="80" x2="130" y2="80" stroke="#7B3F00" stroke-width=".7" opacity=".5"/>
    <line x1="15" y1="105" x2="130" y2="105" stroke="#7B3F00" stroke-width=".7" opacity=".5"/>
    <line x1="15" y1="130" x2="130" y2="130" stroke="#7B3F00" stroke-width=".7" opacity=".5"/>
    <polygon points="5,58 72,10 140,58" fill="#C62828"/>
    <polygon points="72,10 140,58 192,78 L130,55" fill="#8E1A1A"/>
    <line x1="72" y1="10" x2="5" y2="58" stroke="#E53935" stroke-width="2" opacity=".4"/>
    <line x1="72" y1="10" x2="130" y2="55" stroke="#E53935" stroke-width="1.5" opacity=".3"/>
    <rect x="88" y="12" width="16" height="32" fill="#8D6E63" rx="1"/>

<script>
// ===== CONFIG =====
const PEN = { leftPct: 0.02, rightPct: 0.98, topPct: 0.43, bottomPct: 0.98 };
const MAX_CHICKS = 15;
// Gate: positioned at center-bottom of fence, width ~60px
const GATE_WIDTH = 60;
let audioCtx = null;
let gateCenterX = 0; // updated in init
let gateY = 0;       // bottom fence y position

function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function getPenBounds() {
  const g = document.getElementById('game');
  return {
    left: g.offsetWidth * PEN.leftPct,
    right: g.offsetWidth * PEN.rightPct,
    top: g.offsetHeight * PEN.topPct,
    bottom: g.offsetHeight * PEN.bottomPct
  };
}

// ===== Generate Fence Posts (with gate gap) =====
function generateFencePosts() {
  document.querySelectorAll('.fence-post,.fence-gate,.fence-gate-post').forEach(p => p.remove());
  const game = document.getElementById('game');
  const gw = game.offsetWidth, gh = game.offsetHeight;
  const topY = gh * PEN.topPct;
  const botY = gh * PEN.bottomPct;
  const leftX = gw * PEN.leftPct;
  const rightX = gw * PEN.rightPct;
  const fenceH = botY - topY;
  const postH = Math.min(fenceH * 0.08, 60);

  // Gate is at center of bottom rail
  gateCenterX = (leftX + rightX) / 2;
  gateY = botY;
  const gateL = gateCenterX - GATE_WIDTH / 2;
  const gateR = gateCenterX + GATE_WIDTH / 2;

  // Posts along top rail
  const hCount = Math.max(8, Math.floor(gw / 80));
  for (let i = 0; i <= hCount; i++) {
    const x = leftX + (rightX - leftX) * (i / hCount) - 7;
    createPost(game, x, topY - 10, postH);
  }
  // Posts along bottom rail — skip gate area
  for (let i = 0; i <= hCount; i++) {
    const x = leftX + (rightX - leftX) * (i / hCount) - 7;
    if (x + 14 < gateL || x > gateR) {
      createPost(game, x, botY - 4, postH);
    }
  }
  // Posts along left and right rails
  const vCount = Math.max(3, Math.floor(fenceH / 120));
  for (let i = 1; i < vCount; i++) {
    const y = topY + fenceH * (i / vCount) - 10;
    createPost(game, leftX - 2, y, postH * 0.9);
    createPost(game, rightX - 5, y, postH * 0.9);
  }

  // Draw gate: two taller posts + open gate panel (angled open)
  const gatePostH = Math.min(postH * 1.5, 80);
  // Left gate post
  const lpEl = document.createElement('div');
  lpEl.className = 'fence-gate-post';
  lpEl.style.left = (gateL - 8) + 'px';
  lpEl.style.top = (botY - 6) + 'px';
  lpEl.style.height = gatePostH + 'px';
  game.appendChild(lpEl);
  // Right gate post
  const rpEl = document.createElement('div');
  rpEl.className = 'fence-gate-post';
  rpEl.style.left = (gateR - 8) + 'px';
  rpEl.style.top = (botY - 6) + 'px';
  rpEl.style.height = gatePostH + 'px';
  game.appendChild(rpEl);

  // Gate panel: SVG drawn as an open (angled) wooden gate, hinged at left post
  const gateEl = document.createElement('div');
  gateEl.className = 'fence-gate';
  gateEl.style.left = (gateL - 8) + 'px';
  gateEl.style.top = (botY - gatePostH - 4) + 'px';
  gateEl.style.width = (GATE_WIDTH + 20) + 'px';
  gateEl.style.height = gatePostH + 'px';
  // SVG of open gate (rotated 50deg from hinge at top-left)
  gateEl.innerHTML = `<svg width="${GATE_WIDTH+20}" height="${gatePostH}" viewBox="0 0 ${GATE_WIDTH+20} ${gatePostH}">
    <g transform="rotate(-50, 8, ${gatePostH})">
      <rect x="4" y="0" width="${GATE_WIDTH-4}" height="${gatePostH-2}" rx="2" fill="#9C6B2A" stroke="#7A5010" stroke-width="1.5" opacity=".85"/>
      <line x1="4" y1="${gatePostH*0.33}" x2="${GATE_WIDTH-4}" y2="${gatePostH*0.33}" stroke="#7A5010" stroke-width="1.5" opacity=".6"/>
      <line x1="4" y1="${gatePostH*0.66}" x2="${GATE_WIDTH-4}" y2="${gatePostH*0.66}" stroke="#7A5010" stroke-width="1.5" opacity=".6"/>
      <line x1="${GATE_WIDTH*0.45}" y1="2" x2="8" y2="${gatePostH-4}" stroke="#7A5010" stroke-width="1.5" opacity=".5"/>
    </g>
  </svg>`;
  game.appendChild(gateEl);

  // Update bottom fence rail to leave gate gap
  updateBottomRailWithGate(leftX, rightX, botY, gateL, gateR, game);
}

function updateBottomRailWithGate(leftX, rightX, botY, gateL, gateR, game) {
  // Remove existing bottom rail
  document.querySelectorAll('.fence-rail-bottom').forEach(r => r.remove());
  // Left section

function playRoosterSound() {
  const c = getAC(), t = c.currentTime;
  // Part 1: "cock-a" — sharp bark-like rising sound (sine + triangle)
  const o1 = c.createOscillator(), g1 = c.createGain();
  o1.type = 'sine';
  o1.frequency.setValueAtTime(500, t);
  o1.frequency.linearRampToValueAtTime(800, t + 0.15);
  o1.frequency.linearRampToValueAtTime(750, t + 0.25);
  g1.gain.setValueAtTime(0, t);
  g1.gain.linearRampToValueAtTime(0.22, t + 0.02);
  g1.gain.setValueAtTime(0.22, t + 0.15);
  g1.gain.linearRampToValueAtTime(0.12, t + 0.25);
  g1.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
  o1.connect(g1); g1.connect(c.destination);
  o1.start(t); o1.stop(t + 0.32);
  // Triangle harmonic for body
  const o1h = c.createOscillator(), g1h = c.createGain();
  o1h.type = 'triangle';
  o1h.frequency.setValueAtTime(1000, t);
  o1h.frequency.linearRampToValueAtTime(1600, t + 0.15);
  g1h.gain.setValueAtTime(0, t);
  g1h.gain.linearRampToValueAtTime(0.06, t + 0.02);
  g1h.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
  o1h.connect(g1h); g1h.connect(c.destination);
  o1h.start(t); o1h.stop(t + 0.32);

  // Part 2: "doo-doo" — rhythmic main crow (sine with vibrato)
  setTimeout(() => {
    const t2 = c.currentTime;
    const o2 = c.createOscillator(), g2 = c.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(1200, t2);
    // Add vibrato via LFO
    const lfo = c.createOscillator(), lfoG = c.createGain();
    lfo.frequency.value = 8;
    lfoG.gain.value = 30;
    lfo.connect(lfoG); lfoG.connect(o2.frequency);
    lfo.start(t2); lfo.stop(t2 + 0.7);
    // Rhythmic amplitude: two "doo" beats
    g2.gain.setValueAtTime(0, t2);
    g2.gain.linearRampToValueAtTime(0.2, t2 + 0.03);
    g2.gain.setValueAtTime(0.2, t2 + 0.12);
    g2.gain.linearRampToValueAtTime(0.05, t2 + 0.18);
    g2.gain.linearRampToValueAtTime(0.18, t2 + 0.22);
    g2.gain.setValueAtTime(0.18, t2 + 0.38);
    g2.gain.exponentialRampToValueAtTime(0.001, t2 + 0.65);
    o2.frequency.setValueAtTime(1100, t2 + 0.35);
    o2.frequency.linearRampToValueAtTime(900, t2 + 0.65);
    o2.connect(g2); g2.connect(c.destination);
    o2.start(t2); o2.stop(t2 + 0.65);
    // Triangle harmonic for warmth
    const o2h = c.createOscillator(), g2h = c.createGain();
    o2h.type = 'triangle';
    o2h.frequency.setValueAtTime(2400, t2);
    o2h.frequency.linearRampToValueAtTime(1800, t2 + 0.65);
    g2h.gain.setValueAtTime(0, t2);
    g2h.gain.linearRampToValueAtTime(0.04, t2 + 0.03);
    g2h.gain.exponentialRampToValueAtTime(0.001, t2 + 0.65);
    o2h.connect(g2h); g2h.connect(c.destination);
    o2h.start(t2); o2h.stop(t2 + 0.65);
  }, 280);

  // Part 3: trailing "doo" — lower, fading
  setTimeout(() => {
    const t3 = c.currentTime;
    const o3 = c.createOscillator(), g3 = c.createGain();
    o3.type = 'sine';
    o3.frequency.setValueAtTime(700, t3);
    o3.frequency.linearRampToValueAtTime(420, t3 + 0.4);
    g3.gain.setValueAtTime(0, t3);
    g3.gain.linearRampToValueAtTime(0.14, t3 + 0.03);
    g3.gain.exponentialRampToValueAtTime(0.001, t3 + 0.45);
    o3.connect(g3); g3.connect(c.destination);
    o3.start(t3); o3.stop(t3 + 0.45);
  }, 900);
}

function playHenSound() {
  const c = getAC(), t = c.currentTime;
  // Part 1: rapid "cluck cluck cluck" (3-5 short percussive sounds)
  const cluckCount = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < cluckCount; i++) {
    const start = t + i * 0.1;
    const freq = 600 + Math.random() * 200;
    // Sine cluck (softer than square)
    const o = c.createOscillator(), g = c.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(freq, start);
    o.frequency.linearRampToValueAtTime(freq * 0.85, start + 0.06);
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(0.18, start + 0.008);
    g.gain.exponentialRampToValueAtTime(0.001, start + 0.06);
    o.connect(g); g.connect(c.destination);
    o.start(start); o.stop(start + 0.06);
    // Noise click for attack transient
    filteredNoise(0.04, 0.06, 1500, 3500, i * 0.1);
  }
  // Part 2: "BAAAAWK!" — longer, louder, pitch drops (the 哒 sound)
  const bawkStart = t + cluckCount * 0.1 + 0.08;
  const o2 = c.createOscillator(), g2 = c.createGain();
  o2.type = 'sine';
  o2.frequency.setValueAtTime(550, bawkStart);
  o2.frequency.linearRampToValueAtTime(380, bawkStart + 0.25);
  g2.gain.setValueAtTime(0, bawkStart);
  g2.gain.linearRampToValueAtTime(0.25, bawkStart + 0.02);
  g2.gain.setValueAtTime(0.25, bawkStart + 0.15);
  g2.gain.exponentialRampToValueAtTime(0.001, bawkStart + 0.3);
  o2.connect(g2); g2.connect(c.destination);
  o2.start(bawkStart); o2.stop(bawkStart + 0.3);
  // Triangle body for the bawk
  const o2h = c.createOscillator(), g2h = c.createGain();
  o2h.type = 'triangle';
  o2h.frequency.setValueAtTime(1100, bawkStart);
  o2h.frequency.linearRampToValueAtTime(760, bawkStart + 0.25);
  g2h.gain.setValueAtTime(0, bawkStart);
  g2h.gain.linearRampToValueAtTime(0.06, bawkStart + 0.02);
  g2h.gain.exponentialRampToValueAtTime(0.001, bawkStart + 0.3);
  o2h.connect(g2h); g2h.connect(c.destination);
  o2h.start(bawkStart); o2h.stop(bawkStart + 0.3);
}

function filteredNoise(dur, vol, freqLow, freqHigh, delay, type) {
  const c = getAC(), t = c.currentTime + (delay || 0);
  const bs = Math.floor(c.sampleRate * dur), buf = c.createBuffer(1, bs, c.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < bs; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
  const s = c.createBufferSource(), g = c.createGain();
  s.buffer = buf;
  // Bandpass filter
  const f = c.createBiquadFilter();
  f.type = 'bandpass';
  f.frequency.value = (freqLow + freqHigh) / 2;
  f.Q.value = 1;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(Math.min(vol || 0.1, 1), t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  s.connect(f); f.connect(g); g.connect(c.destination);
  s.start(t); s.stop(t + dur);
}

function playBgMelody() {
  if (!bgMusicStarted) return;
  const c = getAC(), now = c.currentTime + 0.05;
  let time = now;
  BGM_MELODY.forEach(n => {
    if (n.f > 0) {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(n.f, time);
      g.gain.setValueAtTime(0, time);
      g.gain.linearRampToValueAtTime(0.06, time + 0.03);
      g.gain.setValueAtTime(0.06, time + n.d * 0.7);
      g.gain.exponentialRampToValueAtTime(0.001, time + n.d);
      o.connect(g); g.connect(bgMusicGain);
      o.start(time); o.stop(time + n.d);
      // Harmonic
      const o2 = c.createOscillator(), g2 = c.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(n.f * 2, time);
      g2.gain.setValueAtTime(0, time);
      g2.gain.linearRampToValueAtTime(0.02, time + 0.03);
      g2.gain.exponentialRampToValueAtTime(0.001, time + n.d);
      o2.connect(g2); g2.connect(bgMusicGain);
      o2.start(time); o2.stop(time + n.d);
    }
    time += n.d + 0.02;
  });
  // Loop: schedule next play
  const totalDur = BGM_MELODY.reduce((sum, n) => sum + n.d + 0.02, 0);
  bgMusicTimer = setTimeout(() => playBgMelody(), totalDur * 1000);
}

function noise(dur, vol, delay) {
  const c = getAC(), t = c.currentTime + (delay || 0);
  const bs = Math.floor(c.sampleRate * dur), buf = c.createBuffer(1, bs, c.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < bs; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
  const s = c.createBufferSource(), g = c.createGain();
  s.buffer = buf;
  g.gain.setValueAtTime(Math.min(vol || 0.1, 1), t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  s.connect(g); g.connect(c.destination);
  s.start(t); s.stop(t + dur);
}

function osc(freq, dur, type, vol, delay) {
  const c = getAC(), t = c.currentTime + (delay || 0);
  const o = c.createOscillator(), g = c.createGain();
  o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(Math.min(vol || 0.3, 1), t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + dur);
  return o;
}

// ===== Egg System =====
let currentEgg = null;

function showEgg(henEl) {
  removeEgg();
  const egg = document.createElement('div'); egg.className = 'egg';
  const r = henEl.getBoundingClientRect();
  const gr = document.getElementById('game').getBoundingClientRect();
  egg.style.left = (r.left - gr.left + r.width / 2 - 14) + 'px';
  egg.style.top = (r.top - gr.top + r.height - 8) + 'px';
  document.getElementById('game').appendChild(egg);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    egg.classList.add('show');
    createSparkles(r.left - gr.left + r.width / 2, r.top - gr.top + r.height - 5, 8,
      ['#FFD700','#FFF176','#FFEE58','#FFE082']);
  }));
  egg.addEventListener('click', (e) => { e.stopPropagation(); hatchEgg(egg); });
  egg.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); hatchEgg(egg); }, {passive:false});
  currentEgg = egg;
  egg._timer = setTimeout(() => removeEgg(), 20000);
}

function removeEgg() {
  if (currentEgg) { clearTimeout(currentEgg._timer); currentEgg.remove(); currentEgg = null; }
}

const hatchColors = [
  {body:'#FFE082', inner:'#FFF176'}, {body:'#FFE0B2', inner:'#FFF3E0'},
  {body:'#F5F5F5', inner:'#FAFAFA'}, {body:'#616161', inner:'#757575'},
  {body:'#FFCCBC', inner:'#FFE0B2'}
];

function hatchEgg(eggEl) {
  if (!eggEl || eggEl.classList.contains('cracking')) return;
  clearTimeout(eggEl._timer);
  eggEl.classList.remove('show');
  eggEl.classList.add('cracking');
  playEggCrackSound();
  const er = eggEl.getBoundingClientRect();
  const gr = document.getElementById('game').getBoundingClientRect();
  const ex = er.left - gr.left + er.width/2, ey = er.top - gr.top + er.height/2;
  createSparkles(ex, ey, 10, ['#FFD700','#FFF176','#FFEE58','#81D4FA','#CE93D8']);
  setTimeout(() => {
    eggEl.remove();
    if (currentEgg === eggEl) currentEgg = null;
    if (chickenData.length >= MAX_CHICKS) {
      const idx = chickenData.findIndex(c => c.el.dataset.hatched === 'true' && c.state !== 'fleeing');
      if (idx >= 0) { chickenData[idx].el.remove(); chickenData.splice(idx, 1); }
    }
    spawnNewChick(ex, ey);
  }, 650);
}

// ===== Side-view Chick SVG =====
const chickColorSets = [
  {body:'#FFE082', light:'#FFF176', wing:'#FFD54F', tail:'#FFD600'},
  {body:'#FFE0B2', light:'#FFF3E0', wing:'#FFCC80', tail:'#F5E6C8'},
  {body:'#F5F5F5', light:'#FAFAFA', wing:'#E0E0E0', tail:'#BDBDBD'},
  {body:'#616161', light:'#757575', wing:'#555',    tail:'#444'},
  {body:'#FFCCBC', light:'#FFE0B2', wing:'#FF8A65', tail:'#FF7043'}
];

function makeChickSVG(v) {
  const c = chickColorSets[v % chickColorSets.length];
  return `<svg viewBox="0 0 54 46" width="54" height="46">
    <path d="M42,18 Q50,10 52,6" fill="none" stroke="${c.tail}" stroke-width="3" stroke-linecap="round"/>
    <path d="M42,20 Q51,14 54,11" fill="none" stroke="${c.wing}" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M42,22 Q50,18 52,16" fill="none" stroke="${c.tail}" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="26" cy="26" rx="18" ry="14" fill="${c.body}"/>
    <ellipse cx="22" cy="24" rx="12" ry="10" fill="${c.light}" opacity=".7"/>
    <ellipse cx="28" cy="24" rx="10" ry="6" fill="${c.wing}" transform="rotate(-10,28,24)" class="chick-wing"/>
    <circle cx="12" cy="17" r="11" fill="${c.light}"/>
    <circle cx="10" cy="14" r="5" fill="rgba(255,255,255,.15)"/>
    <path d="M10,6 Q12,2 14,6" fill="#EF5350" stroke="none"/>
    <path d="M13,7 Q15,3 17,7" fill="#EF5350" stroke="none"/>
    <circle cx="7" cy="16" r="3.2" fill="#212121"/>
    <circle cx="5.8" cy="14.8" r="1.2" fill="white"/>
    <polygon points="2,18 -4,20 2,22" fill="#FF9800"/>
    <polygon points="2,18 -4,20 2,20" fill="#FFB74D"/>
    <g class="chick-leg-front">
      <line x1="22" y1="38" x2="18" y2="44" stroke="#FF9800" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M14,44 L18,44 L22,44" fill="none" stroke="#FF9800" stroke-width="1.8" stroke-linecap="round"/>
    </g>
    <g class="chick-leg-back">
      <line x1="30" y1="38" x2="34" y2="44" stroke="#FF9800" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M30,44 L34,44 L38,44" fill="none" stroke="#FF9800" stroke-width="1.8" stroke-linecap="round"/>
    </g>
  </svg>`;
}

function spawnNewChick(cx, cy) {
  const el = document.createElement('div');
  el.className = 'chicken chick hatching';
  el.dataset.type = 'chick';
  el.dataset.hatched = 'true';
  el.style.left = (cx - 27) + 'px'; el.style.top = (cy - 40) + 'px';
  el.style.zIndex = Math.round(cy);
  const colorIdx = Math.floor(Math.random() * chickColorSets.length);
  el.innerHTML = '<div class="chicken-shadow"></div><div class="chick-body">' + makeChickSVG(colorIdx) + '</div>';
  document.getElementById('game').appendChild(el);
  const w = el.offsetWidth || 54;
  const h = el.offsetHeight || 46;

  el.addEventListener('click', e => { e.stopPropagation(); handleChickenClick(el); });
  el.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); handleChickenClick(el); }, {passive:false});

  setTimeout(() => { el.classList.remove('hatching'); el.classList.add('idle'); }, 650);

  chickenData.push({
    el, type:'chick', sz:{w, h}, hatched:true,
    x: cx-27, y: cy-40, targetX:0, targetY:0,
    speed: 0.55+Math.random()*0.3, facingRight:Math.random()>0.5,
    state:'idle', stateTimer:2000+Math.random()*1000, walkDuration:0, activeTimer:0,
    fleeing: false
  });
}

// ===== Chicken Walking System =====
const chickenData = [];
let animating = {};

// Minimum distance between chicks to avoid clustering
const MIN_CHICK_DIST = 55;

function initChickens() {
  const bounds = getPenBounds();
  const penW = bounds.right - bounds.left;
  const penH = bounds.bottom - bounds.top;
  if (penW < 50 || penH < 50) return;
  const configs = [
    {id:'rooster', type:'rooster', x:0.55, y:0.2, speed:0.38},
    {id:'hen',     type:'hen',     x:0.2,  y:0.45, speed:0.28},
    {id:'chick1',  type:'chick',  x:0.12, y:0.65, speed:0.55},
    {id:'chick2',  type:'chick',  x:0.48, y:0.72, speed:0.5},
    {id:'chick3',  type:'chick',  x:0.72, y:0.5,  speed:0.6}
  ];
  configs.forEach(cfg => {
    const el = document.getElementById(cfg.id);
    if (!el) return;
    const w = el.offsetWidth || 54;
    const h = el.offsetHeight || 46;
    const bw = penW - w;
    const bh = penH - h;
    el.dataset.type = cfg.type;
    chickenData.push({
      el, type:cfg.type, sz:{w, h}, hatched:false,
      x: bounds.left + bw * cfg.x, y: bounds.top + bh * cfg.y,
      targetX:0, targetY:0, speed:cfg.speed,
      facingRight:true, state:'idle', stateTimer:1000+Math.random()*2000,
      walkDuration:0, activeTimer:0, fleeing:false
    });
    el.addEventListener('click', e => { e.stopPropagation(); handleChickenClick(el); });
    el.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); handleChickenClick(el); }, {passive:false});
  });
}

// Pick a new target that avoids clustering with other chicks
function pickNewTarget(d) {
  const b = getPenBounds();
  const pad = 15;
  const availW = b.right - b.left - d.sz.w - pad*2;
  const availH = b.bottom - b.top - d.sz.h - pad*2;
  if (availW < 20 || availH < 20) {
    d.state = 'idle'; d.stateTimer = 1000 + Math.random()*2000; return;
  }

  // Try up to 8 candidate positions and pick the one farthest from other chicks
  let bestX = 0, bestY = 0, bestScore = -1;
  for (let attempt = 0; attempt < 8; attempt++) {
    const tx = b.left + pad + Math.random() * availW;
    const ty = b.top + pad + Math.random() * availH;
    // Score = min distance to other chicks (higher is better)
    let minDist = Infinity;
    chickenData.forEach(other => {
      if (other === d || other.type !== 'chick') return;
      const dx = other.x - tx, dy = other.y - ty;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < minDist) minDist = dist;
    });
    if (minDist === Infinity) minDist = 9999;
    if (minDist > bestScore) { bestScore = minDist; bestX = tx; bestY = ty; }
  }

  d.targetX = bestX;
  d.targetY = bestY;
  d.walkDuration = 2000 + Math.random() * 3000;
  d.stateTimer = d.walkDuration;
  d.state = 'walking';
  d.el.classList.remove('idle','pecking');
  d.el.classList.add('walking');
}

function updateChicken(d, dt) {
  // ===== FLEEING STATE =====
  if (d.state === 'fleeing') {
    const spd = d.speed * dt * 0.13;
    const dx = d.targetX - d.x;
    const dy = d.targetY - d.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 3) {
      d.x += (dx/dist) * spd;
      d.y += (dy/dist) * spd;
      d.facingRight = dx > 0;
    } else {
      // Reached gate vicinity — continue straight out of screen
      d.fleePhase = (d.fleePhase || 0) + 1;
      if (d.fleePhase === 1) {
        // Run straight down/off screen
        const gw = document.getElementById('game').offsetWidth;
        d.targetX = gw / 2 + (Math.random() - 0.5) * 100;
        d.targetY = document.getElementById('game').offsetHeight + 100;
      } else {
        // Off screen — remove
        d.el.style.opacity = '0';
        d.el.style.transition = 'opacity 0.3s';
        setTimeout(() => {
          const idx = chickenData.indexOf(d);
          if (idx >= 0) chickenData.splice(idx, 1);
          d.el.remove();
        }, 350);
        d.state = 'gone';
        return;
      }
    }
    d.el.style.left = d.x + 'px';
    d.el.style.top = d.y + 'px';
    d.el.style.transform = 'scaleX(' + (d.facingRight ? 1 : -1) + ')';
    d.el.style.zIndex = Math.round(d.y);
    return;
  }
  if (d.state === 'gone') return;

  // ===== ACTIVE STATE =====
  if (d.state === 'active') {
    d.activeTimer -= dt;
    if (d.activeTimer <= 0) {
      d.el.classList.remove('active'); d.el.classList.add('idle');
      d.state = 'idle'; d.stateTimer = 1000 + Math.random()*2000;
    }
    d.el.style.left = d.x+'px'; d.el.style.top = d.y+'px';
    d.el.style.transform = 'scaleX('+(d.facingRight?1:-1)+')';
    d.el.style.zIndex = Math.round(d.y);
    return;
  }

  // ===== SEPARATION: push chicks apart if too close =====
  if (d.type === 'chick') {
    chickenData.forEach(other => {
      if (other === d || other.type !== 'chick' || other.state === 'fleeing' || other.state === 'gone') return;
      const dx = d.x - other.x, dy = d.y - other.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 0 && dist < MIN_CHICK_DIST) {
        const push = (MIN_CHICK_DIST - dist) * 0.015;
        d.x += (dx/dist) * push;
        d.y += (dy/dist) * push;
      }
    });
    // Clamp to pen
    const b = getPenBounds();
    d.x = Math.max(b.left + 8, Math.min(d.x, b.right - d.sz.w - 8));
    d.y = Math.max(b.top + 8, Math.min(d.y, b.bottom - d.sz.h - 8));
  }

  d.stateTimer -= dt;
  if (d.state === 'idle') {
    if (d.stateTimer <= 0) {
      const r = Math.random();
      if (r < 0.6) pickNewTarget(d);
      else { d.state='pecking'; d.stateTimer=1500+Math.random()*2000; d.el.classList.remove('idle','walking'); d.el.classList.add('pecking'); }
    }
  } else if (d.state === 'walking') {
    if (d.stateTimer <= 0 || (Math.abs(d.x-d.targetX)<3 && Math.abs(d.y-d.targetY)<3)) {
      d.state='idle'; d.stateTimer=1200+Math.random()*2500;
      d.el.classList.remove('walking'); d.el.classList.add('idle');
    } else {
      const dx=d.targetX-d.x, dy=d.targetY-d.y, dist=Math.sqrt(dx*dx+dy*dy);
      if (dist>1) { const ms=d.speed*dt*0.055; d.x+=(dx/dist)*ms; d.y+=(dy/dist)*ms; d.facingRight=dx>0; }
    }
  } else if (d.state === 'pecking') {
    if (d.stateTimer <= 0) { d.state='idle'; d.stateTimer=1000+Math.random()*2000; d.el.classList.remove('pecking'); d.el.classList.add('idle'); }
  }
  d.el.style.left = d.x+'px'; d.el.style.top = d.y+'px';
  d.el.style.transform = 'scaleX('+(d.facingRight?1:-1)+')';
  d.el.style.zIndex = Math.round(d.y);
}

let lastTime = 0;
function gameLoop(time) {
  if (lastTime === 0) lastTime = time;
  const dt = Math.min(time - lastTime, 50);
  lastTime = time;
  chickenData.forEach(d => updateChicken(d, dt));
  requestAnimationFrame(gameLoop);
}

// ===== Flee to gate =====
function startFleeing(d) {
  d.state = 'fleeing';
  d.fleePhase = 0;
  d.speed = 1.0 + Math.random() * 0.4; // faster when fleeing
  d.targetX = gateCenterX;
  d.targetY = gateY - d.sz.h * 0.5;
  d.el.classList.remove('idle','walking','pecking','active');
  d.el.classList.add('running');
  d.el.style.zIndex = 200; // on top while escaping
}

// ===== Click Handler =====
function handleChickenClick(el) {
  const id = el.id || el.dataset.id;
  const type = el.dataset.type;

  // Chick: play sound then flee
  if (type === 'chick') {
    if (animating[id]) return;
    animating[id] = true;
    preloadSounds();
    playChickSound();
    // Brief flash
    el.classList.add('clicked');
    setTimeout(() => el.classList.remove('clicked'), 200);
    // Start fleeing after short chirp delay
    setTimeout(() => {
      const d = chickenData.find(c => c.el === el);
      if (d && d.state !== 'fleeing' && d.state !== 'gone') {
        startFleeing(d);
      }
    }, 350);
    return;
  }

  // Rooster & Hen: original behavior
  if (animating[id]) return;
  animating[id] = true;

  if (type === 'rooster') playRoosterSound();
  else if (type === 'hen') playHenSound();

  el.classList.remove('idle','walking','pecking');
  el.classList.add('active','clicked');
  setTimeout(() => el.classList.remove('clicked'), 300);

  const d = chickenData.find(c => c.el === el);
  if (d) { d.state='active'; d.activeTimer = type==='hen'?1300:900; }

  const r = el.getBoundingClientRect();
  const gr = document.getElementById('game').getBoundingClientRect();
  const cx = r.left - gr.left + r.width/2, cy = r.top - gr.top + r.height*0.3;

  if (type === 'rooster') {
    createParticle(cx-20, cy-10, '♪'); createParticle(cx+10, cy-20, '♫');
    createSparkles(cx, cy, 6, ['#FF6B6B','#FF8E53','#FFD700']);
  } else if (type === 'hen') {
    setTimeout(() => showEgg(el), 1000);
    createParticle(cx, cy-5, '💛');
  }

  const dur = type==='hen'?1300:900;
  setTimeout(() => {
    el.classList.remove('active');
    animating[id] = false;
    const dd = chickenData.find(c => c.el === el);
    if (dd) { dd.state='idle'; dd.stateTimer=800+Math.random()*1500; el.classList.add('idle'); }
  }, dur);
}

// ===== Init =====
function init() {
  generateFencePosts();
  initChickens();
  requestAnimationFrame(gameLoop);

  const nb = document.getElementById('nuonuo-banner');
  if (nb) {
    nb.addEventListener('click', e => { e.stopPropagation(); playNuoNuoSound(); });
    nb.addEventListener('touchstart', e => { e.preventDefault(); playNuoNuoSound(); }, {passive:false});
  }

  const tryPreload = () => { preloadSounds(); };
  document.addEventListener('click', tryPreload, { once: true, capture: true });
  document.addEventListener('touchstart', tryPreload, { once: true, capture: true });
}

window.addEventListener('resize', () => {
  generateFencePosts();
  const b = getPenBounds();
  const penW = b.right - b.left;
  const penH = b.bottom - b.top;
  chickenData.forEach(d => {
    if (d.state === 'fleeing' || d.state === 'gone') return;
    const newW = d.el.offsetWidth || d.sz.w;
    const newH = d.el.offsetHeight || d.sz.h;
    d.sz.w = newW; d.sz.h = newH;
    d.x = Math.max(b.left, Math.min(d.x, b.right - d.sz.w));
    d.y = Math.max(b.top, Math.min(d.y, b.bottom - d.sz.h));
    if (d.x <= b.left + 1 && d.y <= b.top + 1 && penW > 50 && penH > 50) {
      d.x = b.left + Math.random() * (penW - d.sz.w);
      d.y = b.top + Math.random() * (penH - d.sz.h);
    }
  });
});

let audioInited = false;
function initAudio() {
  if (!audioInited) { getAC(); audioInited = true; startBgMusic(); }
}
document.addEventListener('click', initAudio, {once:true});
document.addEventListener('touchstart', initAudio, {once:true});

// Random idle chirps (only for in-pen chicks)
function randomChirp() {
  const chicks = chickenData.filter(c => c.type==='chick' && c.state==='idle');
  if (chicks.length > 0 && Math.random() > 0.6) playChickSound();
  setTimeout(randomChirp, 6000 + Math.random() * 9000);
}
setTimeout(randomChirp, 6000);

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => requestAnimationFrame(safeInit));
} else {
  requestAnimationFrame(safeInit);
}

function safeInit() {
  const g = document.getElementById('game');
  if (g.offsetWidth < 50 || g.offsetHeight < 50) {
    requestAnimationFrame(safeInit);
    return;
  }
  init();
}
